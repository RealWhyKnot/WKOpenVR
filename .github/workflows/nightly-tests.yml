name: Nightly tests

# Scheduled full test pass: everything CI's dev leg runs plus the Phase 4
# download + load tests (captions models, VRCFT modules), which are too
# network-dependent for per-push CI. Complements nightly-tidy.yml, which owns
# the full-tree clang-tidy pass.
on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-tests:
    name: build + full test pipeline (windows, dev)
    runs-on: windows-2025-vs2026
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Checkout submodules (with retry)
        uses: ./.github/actions/checkout-submodules

      - name: Set up .NET 10 SDK
        # Pinned by modules/facetracking/src/host/global.json; without it the
        # CMake host target silently skips itself.
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore build directory cache
        # Restore-only: CI's dev leg owns saving this cache key.
        uses: actions/cache/restore@v6
        with:
          path: build
          key: build-vs2026-${{ runner.os }}-dev-${{ hashFiles('**/CMakeLists.txt', 'core/src/**/*.cpp', 'core/src/**/*.h', 'modules/**/*.cpp', 'modules/**/*.h', 'modules/**/*.cs', '.gitmodules', 'version.txt') }}
          restore-keys: |
            build-vs2026-${{ runner.os }}-dev-

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('modules/facetracking/src/host/**/*.csproj', 'modules/facetracking/src/host/**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Configure
        # Mirrors ci.yml's dev-leg configure (see the policy note there).
        run: cmake -G "Visual Studio 18 2026" -A x64 -B build -S . '-DCMAKE_POLICY_VERSION_MINIMUM=3.5' -DWKOPENVR_CAPTIONS_CUDA=OFF -DWKOPENVR_CAPTIONS_VULKAN=OFF -DWKOPENVR_RELEASE_BUILD=OFF -Wno-dev

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run full test pipeline
        # No -SkipDownload: Phase 4 downloads and loads the captions models and
        # VRCFT modules on top of the gtest binaries, sidecar self-tests, and
        # the in-process driver harness.
        shell: pwsh
        run: ./test.ps1 -SkipBuild
