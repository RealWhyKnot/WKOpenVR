# Builds the shared WKOpenVR release artifacts, then publishes one Setup.exe
# per active public module to that module's repository. Modules carrying
# modules/<slug>/disabled-in-release.flag are excluded from the per-feature
# installer loop and from zip staging so an unstable feature never lands in
# published artifacts.

name: Release

# Triggered by pushing a tag like v2026.5.12.0. Builds the shared binary
# (WKOpenVR.exe), driver (driver_wkopenvr.dll), and -- when their modules
# are not flagged disabled-in-release -- the C# face-tracking host and the
# native captions host. Runs the test suite, builds the shared installer for
# round-trip coverage, builds one Setup.exe per active feature, and publishes
# those feature installers to their module repositories.
#
# Changelog promotion: before the build, Update-Changelog.ps1 renames the
# "## Unreleased" heading to "## vTAG -- DATE". After the module releases
# are created those promoted files are pushed back to main via the GraphQL
# createCommitOnBranch mutation (signed server-side).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Share a concurrency group with changelog-append so the appender can't run
# during a release and add entries to main's Unreleased that the release
# itself doesn't contain.
concurrency:
  group: changelog-append
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: windows-2025-vs2026
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect beta tag
        id: beta
        shell: pwsh
        # Only -beta tags mark the GitHub release as prerelease. Other
        # semver-style suffixes (-rc, -alpha, -pre, -snapshot) are not
        # used in this project. The regex is tighter than the original
        # `-like '*-beta*'` glob so a malformed tag like `v2026.5.22.0beta`
        # (missing hyphen) no longer matches by accident.
        run: |
          $tag = '${{ github.ref_name }}'
          $isBeta = $tag -match '^v\d{4}\.\d+\.\d+\.\d+-beta$'
          if ($tag -match '-beta' -and -not $isBeta) {
            throw "Beta tags must match vYYYY.M.D.N-beta."
          }
          "is_beta=$($isBeta.ToString().ToLower())" >> $env:GITHUB_OUTPUT

      - name: Validate workflow / script PowerShell syntax
        # Fails the run in seconds if any committed .ps1 or inline pwsh
        # block in the workflow YAML has a parser error. Designed to
        # catch the class of latent bug that took down v2026.5.13.0
        # twice in a row (a `$Var:` interpolation that never reached
        # the executed branch until release time, and a similar
        # construct in a feature-removal commit).
        shell: pwsh
        run: |
          ./.github/scripts/Test-WorkflowSyntax.ps1
          ./.github/scripts/Test-UpdateChangelog.ps1
          ./.github/scripts/Test-NightlyBetaPlan.ps1
          ./.github/scripts/Test-ReleaseVersionSequence.ps1

      - name: Test release notes generator
        shell: pwsh
        run: ./.github/scripts/Test-GenerateReleaseNotes.ps1

      - name: Validate release version sequence
        shell: pwsh
        run: ./.github/scripts/Assert-ReleaseVersionSequence.ps1 -Tag '${{ github.ref_name }}'

      - name: Plan beta module releases
        id: beta_plan
        if: ${{ steps.beta.outputs.is_beta == 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.MIRROR_RELEASE_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            throw "MIRROR_RELEASE_TOKEN secret is required to plan beta module releases."
          }
          git fetch --tags --force
          ./.github/scripts/Get-NightlyBetaPlan.ps1 -Tag '${{ github.ref_name }}'

      - name: Promote Unreleased -> tagged section
        shell: pwsh
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ./.github/scripts/Update-Changelog.ps1 -Mode Promote -Version '${{ github.ref_name }}'
          New-Item -ItemType Directory -Force -Path .changelog-stash | Out-Null
          Copy-Item CHANGELOG.md .changelog-stash/CHANGELOG.md -Force

      - name: Set up .NET 10 SDK
        # FaceModuleHost is a .NET 10 sidecar (pinned by
        # modules/facetracking/src/host/global.json). Without an explicit
        # setup the runner's default dotnet may not include 10.x, which
        # makes the CMake host target silently skip itself via
        # `if(NOT DOTNET_EXECUTABLE) return()` -- the build "succeeds" but
        # the installer would ship without the face-tracking host process.
        # Pinning here means a future runner-image change still produces
        # the same artifact set.
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache build directory
        # CMake handles incremental builds natively. Caching build/ between
        # runs cuts a cold ~6 min MSVC pass down to ~1 min when only a few
        # files changed since the last successful run. The restore-keys
        # fallback lets a near-miss (different source hash) reuse the
        # most recent build state -- CMake then recompiles only what
        # changed.
        uses: actions/cache@v5
        with:
          path: build
          key: build-vs2026-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'core/src/**/*.cpp', 'core/src/**/*.h', 'modules/**/*.cpp', 'modules/**/*.h', 'modules/**/*.cs', '.gitmodules', 'version.txt') }}
          restore-keys: |
            build-vs2026-${{ runner.os }}-

      - name: Cache NuGet packages
        # FaceModuleHost's dotnet publish restores NuGet packages on every
        # cold run. Caching the user-level NuGet folder keeps them warm.
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('modules/facetracking/src/host/**/*.csproj', 'modules/facetracking/src/host/**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache NSIS install
        # Skips the ~30 s choco install on warm runs. Key bumped on NSIS
        # upgrades.
        uses: actions/cache@v5
        with:
          path: 'C:\Program Files (x86)\NSIS'
          key: nsis-${{ runner.os }}-3.12

      - name: Stamp generated headers
        # CMake registers the three gitignored channel headers as sources, so
        # they must exist BEFORE the Configure step or CMake aborts with
        # "No SOURCES given to target: openvr_pair_common".
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:TAG_NAME -replace '^v', ''
          Set-Content -Path version.txt -Value $version -NoNewline

          $CommonBuildChannel = "core/src/common/BuildChannel.h"
          if (Test-Path (Split-Path -Parent $CommonBuildChannel)) {
            Set-Content -Path $CommonBuildChannel -Value @"
          // Overwritten by release.yml with the shared binary's per-build stamp.
          #pragma once

          #define WKOPENVR_BUILD_STAMP "$version"
          #define WKOPENVR_BUILD_CHANNEL "release"
          #define WKOPENVR_BUILD_IS_DEV 0
          "@
          }

          $ScBuildStamp = "modules/calibration/src/overlay/BuildStamp.h"
          if (Test-Path (Split-Path -Parent $ScBuildStamp)) {
            # Indent the here-string contents to match the surrounding YAML
            # block scalar indent (10 spaces). YAML strips the common indent
            # before the runner sees the script, so PowerShell receives a
            # column-0 here-string that satisfies the "@ at column 0 rule.
            Set-Content -Path $ScBuildStamp -Value @"
          // Overwritten by release.yml with the shared binary's per-build stamp.
          #pragma once

          #define SPACECAL_BUILD_STAMP "$version"
          #define SPACECAL_BUILD_CHANNEL "release"
          "@
          }

          $FtBuildStamp = "modules/facetracking/src/overlay/BuildStamp.h"
          if (Test-Path (Split-Path -Parent $FtBuildStamp)) {
            Set-Content -Path $FtBuildStamp -Value @"
          // Overwritten by release.yml with the shared binary's per-build stamp.
          #pragma once

          #define FACETRACKING_BUILD_STAMP "$version"
          #define FACETRACKING_BUILD_CHANNEL "release"
          "@
          }

      - name: Install Vulkan SDK
        # The captions speech host links whisper.cpp's Vulkan backend for GPU
        # (vendor-neutral) speech recognition. ggml-vulkan compiles GLSL compute
        # shaders at build time via glslc, which ships with the Vulkan SDK, so the
        # SDK is a build-host dependency. Runtime needs only the system vulkan-1.dll.
        shell: pwsh
        # Single source of the pinned SDK version + install logic lives in
        # tools/Install-VulkanSdk.ps1 (shared with build.ps1 for local builds).
        run: |
          & "$env:GITHUB_WORKSPACE\tools\Install-VulkanSdk.ps1" -AutoInstall
          if (-not $env:VULKAN_SDK) { throw "Vulkan SDK install did not set VULKAN_SDK" }
          "VULKAN_SDK=$env:VULKAN_SDK" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          (Join-Path $env:VULKAN_SDK "Bin") | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Configure
        # The minhook submodule declares cmake_minimum_required(2.8.12) which
        # CMake 4.x rejects. -DCMAKE_POLICY_VERSION_MINIMUM=3.5 lets us configure
        # without forking. -Wno-dev silences developer-mode warnings from minhook.
        # WKOPENVR_CAPTIONS_VULKAN=ON ships GPU-accelerated speech recognition.
        run: cmake -G "Visual Studio 18 2026" -A x64 -B build -S . '-DCMAKE_POLICY_VERSION_MINIMUM=3.5' -DWKOPENVR_CAPTIONS_CUDA=OFF -DWKOPENVR_CAPTIONS_VULKAN=ON -DWKOPENVR_RELEASE_BUILD=ON -Wno-dev

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel
          if ($LASTEXITCODE -ne 0) { throw "Build failed (exit $LASTEXITCODE)" }

      - name: Run tests
        shell: pwsh
        run: |
          $tests = Get-ChildItem build/artifacts/Release/*_tests.exe
          if ($tests.Count -eq 0) { throw "No test binaries found" }
          foreach ($t in $tests) {
            Write-Host "Running $($t.Name)..."
            & $t.FullName --gtest_brief=1
            if ($LASTEXITCODE -ne 0) { throw "$($t.Name) failed (exit $LASTEXITCODE)" }
          }

      - name: Run captions host self-test
        if: ${{ hashFiles('modules/captions/disabled-in-release.flag') == '' }}
        shell: pwsh
        run: |
          $hostExe = 'build/driver_wkopenvr/resources/captions/host/WKOpenVR.CaptionsHost.exe'
          if (-not (Test-Path -LiteralPath $hostExe)) {
            throw "Captions host missing at $hostExe"
          }
          # The captions host links as SUBSYSTEM:WINDOWS to avoid a console flash
          # on driver-side spawn. PowerShell's `& exe` does not wait for
          # SUBSYSTEM:WINDOWS processes -- it starts them detached and leaves
          # $LASTEXITCODE unset. Start-Process -Wait blocks until exit and
          # exposes the real exit code on the returned process object.
          $p = Start-Process -FilePath $hostExe -ArgumentList '--self-test' `
              -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "Captions host self-test failed (exit $($p.ExitCode))" }

      - name: Package shared zip
        id: zip
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $version   = $env:TAG_NAME -replace '^v', ''
          $artifacts = "build/artifacts/Release"
          $driverSrc = "build/driver_wkopenvr"

          # --- Pre-stage cleanup ------------------------------------------
          # actions/cache@v5 restores build/ from prior runs. A previous dev
          # build (with no disabled-in-release.flag in place) can leave
          # build/driver_wkopenvr/resources/<gated-slug>/host populated with
          # host exes that the current release build wouldn't produce. Wipe
          # those orphan directories before staging so they cannot leak into
          # the shared zip.
          foreach ($slug in 'facetracking','captions','oscrouter','phantom') {
            if (Test-Path -LiteralPath "modules/$slug/disabled-in-release.flag") {
              $orphan = "$driverSrc/resources/$slug"
              if (Test-Path -LiteralPath $orphan) {
                Write-Host "Removing orphan gated-module dir from cached build: $orphan"
                Remove-Item -Recurse -Force -LiteralPath $orphan
              }
            }
          }

          if (-not (Test-Path "$artifacts/WKOpenVR.exe")) {
            throw "WKOpenVR.exe not found at $artifacts"
          }
          if (-not (Test-Path "$driverSrc/bin/win64/driver_wkopenvr.dll")) {
            throw "driver_wkopenvr.dll not found at $driverSrc/bin/win64"
          }
          if (-not (Test-Path "$artifacts/manifest.vrmanifest")) {
            throw "manifest.vrmanifest not found at $artifacts (build step copies it from core/src/overlay/)"
          }

          # --- Assemble the driver tree into a staging directory ----------
          # The installer convention: the DLL is renamed driver_01wkopenvr.dll
          # so SteamVR's alphabetic-sort loads it after any existing drivers.
          $stage = "release/_stage_$version"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Force -Path "$stage/driver_wkopenvr/bin/win64" | Out-Null
          New-Item -ItemType Directory -Force -Path "$stage/driver_wkopenvr/resources/settings" | Out-Null

          Copy-Item "$driverSrc/driver.vrdrivermanifest"                  "$stage/driver_wkopenvr/driver.vrdrivermanifest"
          Copy-Item "$driverSrc/resources/driver.vrresources"              "$stage/driver_wkopenvr/resources/driver.vrresources"
          Copy-Item "$driverSrc/resources/settings/default.vrsettings"    "$stage/driver_wkopenvr/resources/settings/default.vrsettings"
          Copy-Item "$driverSrc/bin/win64/driver_wkopenvr.dll"           "$stage/driver_wkopenvr/bin/win64/driver_01wkopenvr.dll"

          # Disabled-in-release markers gate every per-module artifact below.
          # A disabled module's CMake helper short-circuited add_subdirectory,
          # so the build never produced the host exes / input profiles to stage.
          $faceTrackingEnabled = -not (Test-Path -LiteralPath 'modules/facetracking/disabled-in-release.flag')
          $captionsEnabled     = -not (Test-Path -LiteralPath 'modules/captions/disabled-in-release.flag')
          $phantomEnabled      = -not (Test-Path -LiteralPath 'modules/phantom/disabled-in-release.flag')

          if ($faceTrackingEnabled) {
            $srcFt = "$driverSrc/resources/facetracking"
            if (Test-Path $srcFt) {
              Copy-Item -Recurse -Path $srcFt -Destination "$stage/driver_wkopenvr/resources/facetracking"
            }
          } else {
            Write-Host "Skipping resources/facetracking stage (modules/facetracking/disabled-in-release.flag)."
          }

          if ($captionsEnabled) {
            $srcTr = "$driverSrc/resources/captions"
            if (Test-Path $srcTr) {
              Copy-Item -Recurse -Path $srcTr -Destination "$stage/driver_wkopenvr/resources/captions"
            }
          } else {
            Write-Host "Skipping resources/captions stage (modules/captions/disabled-in-release.flag)."
          }

          if (-not (Test-Path "$artifacts/dashboard_icon.png")) {
            throw "dashboard_icon.png not found at $artifacts"
          }
          if (-not (Test-Path "$artifacts/boundary_icon.png")) {
            throw "boundary_icon.png not found at $artifacts"
          }
          if (-not (Test-Path "$artifacts/resources/face-module-sync.ps1")) {
            throw "face-module-sync.ps1 not found at $artifacts/resources"
          }
          if (-not (Test-Path "$artifacts/resources/questapp/install-platform-tools.ps1")) {
            throw "Quest App platform-tools installer not found at $artifacts/resources/questapp"
          }
          if (-not (Test-Path "$artifacts/resources/questapp/uninstall-questapp.ps1")) {
            throw "Quest App uninstaller not found at $artifacts/resources/questapp"
          }
          if (-not (Test-Path "$artifacts/resources/questapp/WKOpenVRQuestCompanion.apk")) {
            throw "Quest App companion APK not found at $artifacts/resources/questapp"
          }

          Copy-Item "$artifacts/WKOpenVR.exe"        "$stage/WKOpenVR.exe"
          Copy-Item "$artifacts/openvr_api.dll"      "$stage/openvr_api.dll"
          # manifest.vrmanifest is what RegisterApplicationManifest in
          # WKOpenVR.exe loads on first launch to register the overlay with
          # SteamVR. Zip-extract users would get no SteamVR autolaunch
          # without it.
          Copy-Item "$artifacts/manifest.vrmanifest" "$stage/manifest.vrmanifest"
          foreach ($resource in $overlayInputResources) {
            Copy-Item "$artifacts/$resource" "$stage/$resource"
          }
          Copy-Item "$artifacts/dashboard_icon.png"  "$stage/dashboard_icon.png"
          Copy-Item "$artifacts/boundary_icon.png"   "$stage/boundary_icon.png"
          New-Item -ItemType Directory -Force -Path "$stage/resources" | Out-Null
          Copy-Item "$artifacts/resources/face-module-sync.ps1" "$stage/resources/face-module-sync.ps1"
          New-Item -ItemType Directory -Force -Path "$stage/resources/questapp" | Out-Null
          Copy-Item "$artifacts/resources/questapp/install-platform-tools.ps1" "$stage/resources/questapp/install-platform-tools.ps1"
          Copy-Item "$artifacts/resources/questapp/uninstall-questapp.ps1" "$stage/resources/questapp/uninstall-questapp.ps1"
          Copy-Item "$artifacts/resources/questapp/WKOpenVRQuestCompanion.apk" "$stage/resources/questapp/WKOpenVRQuestCompanion.apk"

          # Stage the C# face-tracking host. CMake publishes it to
          # build/artifacts/FaceModuleHost/; the workflow runs cmake directly
          # so we copy it into the stage here. The driver's HostSupervisor
          # resolves the host exe relative to the driver's own resources directory.
          if ($faceTrackingEnabled) {
            $faceHostBuildDir = "build/artifacts/FaceModuleHost"
            $faceHostStageDir = "$stage/driver_wkopenvr/resources/facetracking/host"
            if (-not (Test-Path $faceHostBuildDir)) {
              throw "Face-tracking host build output missing at $faceHostBuildDir (was OPENVR_PAIR_BUILD_FACE_HOST=OFF or did dotnet publish fail?)"
            }
            New-Item -ItemType Directory -Force -Path $faceHostStageDir | Out-Null
            Copy-Item -Recurse -Force -Path "$faceHostBuildDir\*" -Destination $faceHostStageDir
            if (-not (Test-Path "$faceHostStageDir/WKOpenVR.FaceModuleHost.exe")) {
              throw "Staged WKOpenVR.FaceModuleHost.exe missing under $faceHostStageDir."
            }
          } else {
            Write-Host "Face-tracking host staging skipped (modules/facetracking/disabled-in-release.flag)."
          }

          # Verify the native captions host staged correctly. The resource-tree
          # copy above already pulled in the host directory; this block catches
          # a missing CaptionsHost build early with a clear message instead of
          # leaving a silent gap in the release zip.
          if ($captionsEnabled) {
            $trHostStageExe = "$stage/driver_wkopenvr/resources/captions/host/WKOpenVR.CaptionsHost.exe"
            if (-not (Test-Path $trHostStageExe)) {
              throw "WKOpenVR.CaptionsHost.exe missing from stage at $trHostStageExe. Check that OPENVR_PAIR_BUILD_CAPTIONS_HOST is ON and the captions host CMake target built successfully."
            }
            $trHostOpenVr = "$stage/driver_wkopenvr/resources/captions/host/openvr_api.dll"
            if (-not (Test-Path $trHostOpenVr)) {
              throw "openvr_api.dll missing beside CaptionsHost at $trHostOpenVr."
            }
            $trPackManifest = "$stage/driver_wkopenvr/resources/captions/host/resources/captions-packs.json"
            if (-not (Test-Path $trPackManifest)) {
              throw "Captions pack manifest missing from stage at $trPackManifest."
            }
          } else {
            Write-Host "Captions host staging skipped (modules/captions/disabled-in-release.flag)."
          }

          New-Item -ItemType Directory -Force -Path "release" | Out-Null

          # --- Shared zip -----------------------------------------------------
          # One artifact for the published release. The installer drops the
          # appropriate enable_*.flag files at install time, so the zip itself
          # ships with none.
          $umbrellaZipPath = "release/WKOpenVR-$version.zip"
          if (Test-Path $umbrellaZipPath) { Remove-Item $umbrellaZipPath -Force }
          Compress-Archive -Path "$stage/*" -DestinationPath $umbrellaZipPath -CompressionLevel Optimal
          $umbrellaItem = Get-Item $umbrellaZipPath
          $umbrellaHash = (Get-FileHash $umbrellaZipPath -Algorithm SHA256).Hash
          Write-Host "Shared zip: $($umbrellaItem.Name) ($($umbrellaItem.Length) bytes) sha256=$umbrellaHash"

          Remove-Item -Recurse -Force $stage

          "umbrella_path=$((Resolve-Path $umbrellaZipPath).Path)" >> $env:GITHUB_OUTPUT
          "umbrella_name=$($umbrellaItem.Name)"                   >> $env:GITHUB_OUTPUT
          "umbrella_size=$($umbrellaItem.Length)"                 >> $env:GITHUB_OUTPUT
          "umbrella_sha256=$umbrellaHash"                         >> $env:GITHUB_OUTPUT

      - name: Verify NSIS input artifacts staged
        # makensis errors with an obscure "no files found" when File /r is
        # pointed at an empty or missing directory. Failing here with the
        # exact missing path makes future staging gaps trivial to diagnose
        # instead of leaving the user to read the makensis output.
        shell: pwsh
        run: |
          $required = [System.Collections.Generic.List[string]]@(
            'build/artifacts/Release/WKOpenVR.exe',
            'build/artifacts/Release/openvr_api.dll',
            'build/artifacts/Release/manifest.vrmanifest',
            'build/artifacts/Release/dashboard_icon.png',
            'build/artifacts/Release/boundary_icon.png',
            'build/artifacts/Release/resources/face-module-sync.ps1',
            'build/artifacts/Release/resources/questapp/install-platform-tools.ps1',
            'build/artifacts/Release/resources/questapp/uninstall-questapp.ps1',
            'build/artifacts/Release/resources/questapp/WKOpenVRQuestCompanion.apk',
            'build/driver_wkopenvr/driver.vrdrivermanifest',
            'build/driver_wkopenvr/resources/driver.vrresources',
            'build/driver_wkopenvr/resources/settings/default.vrsettings',
            'build/driver_wkopenvr/bin/win64/driver_wkopenvr.dll'
          )
          # Per-module artifacts: only verify the ones whose modules are
          # actually built into this release (the disabled-in-release marker
          # tells the CMake helper to skip add_subdirectory for those, so
          # their host exes / input profiles never get produced).
          if (-not (Test-Path -LiteralPath 'modules/facetracking/disabled-in-release.flag')) {
            $required.Add('build/driver_wkopenvr/resources/facetracking/host/WKOpenVR.FaceModuleHost.exe')
          }
          if (-not (Test-Path -LiteralPath 'modules/captions/disabled-in-release.flag')) {
            $required.Add('build/driver_wkopenvr/resources/captions/host/WKOpenVR.CaptionsHost.exe')
            $required.Add('build/driver_wkopenvr/resources/captions/host/openvr_api.dll')
            $required.Add('build/driver_wkopenvr/resources/captions/host/resources/captions-packs.json')
            $required.Add('build/driver_wkopenvr/resources/captions/host/resources/install-captions-pack.ps1')
          }
          if (-not (Test-Path -LiteralPath 'modules/phantom/disabled-in-release.flag')) {
            $required.Add('build/driver_wkopenvr/resources/phantom/host/WKOpenVRPhantomSidecar.exe')
            $required.Add('build/driver_wkopenvr/resources/input/vive_tracker_waist_profile.json')
            $required.Add('build/driver_wkopenvr/resources/input/vive_tracker_left_foot_profile.json')
            $required.Add('build/driver_wkopenvr/resources/input/vive_tracker_right_foot_profile.json')
          }
          $missing = @()
          foreach ($p in $required) {
            if (-not (Test-Path -LiteralPath $p)) { $missing += $p }
          }
          if ($missing.Count -gt 0) {
            Write-Host "Missing artifacts required by installer.nsi:"
            $missing | ForEach-Object { Write-Host "  - $_" }
            throw "NSIS input artifacts are not fully staged. The CMake build did not produce one or more required files."
          }
          Write-Host "All NSIS input artifacts present."

      - name: Install NSIS
        # No-op when the NSIS cache step above restored the install tree.
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe") {
            Write-Host "NSIS already present (cache hit) -- skipping choco install."
            exit 0
          }
          choco install nsis -y --no-progress
          if ($LASTEXITCODE -ne 0) { throw "NSIS install failed (exit $LASTEXITCODE)" }

      - name: Build shared NSIS installer
        id: installer
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:TAG_NAME -replace '^v', ''
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) { $makensis = "C:\Program Files\NSIS\makensis.exe" }
          if (-not (Test-Path $makensis)) { throw "makensis.exe not found in the standard NSIS install paths." }
          # installer.nsi OutFile is "..\build\artifacts\Release\WKOpenVR-Installer.exe"
          # (relative to the install/ directory), so it writes to build/artifacts/Release/.
          Push-Location install
          & $makensis "/DVERSION=$version" installer.nsi
          $exitCode = $LASTEXITCODE
          Pop-Location
          if ($exitCode -ne 0) { throw "makensis exited $exitCode" }
          $raw = Get-Item "build/artifacts/Release/WKOpenVR-Installer.exe"
          $versioned = "release/WKOpenVR-v$version-Setup.exe"
          Move-Item $raw.FullName $versioned -Force
          $hash = (Get-FileHash $versioned -Algorithm SHA256).Hash
          $size = (Get-Item $versioned).Length
          "path=$((Resolve-Path $versioned).Path)" >> $env:GITHUB_OUTPUT
          "name=$(Split-Path -Leaf $versioned)"    >> $env:GITHUB_OUTPUT
          "size=$size"                             >> $env:GITHUB_OUTPUT
          "sha256=$hash"                           >> $env:GITHUB_OUTPUT
          Write-Host "Installer: $versioned ($size bytes) sha256=$hash"

      - name: Test installer uninstall/reinstall
        timeout-minutes: 8
        shell: pwsh
        run: |
          ./.github/scripts/Test-InstallerRoundTrip.ps1 `
            -InstallerPath '${{ steps.installer.outputs.path }}' `
            -AllowUserDataRemoval

      - name: Build per-feature NSIS installers
        id: feature_installers
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
          IS_BETA: ${{ steps.beta.outputs.is_beta }}
          BETA_FEATURES: ${{ steps.beta_plan.outputs.features_csv }}
        run: |
          $version = $env:TAG_NAME -replace '^v', ''
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) { $makensis = "C:\Program Files\NSIS\makensis.exe" }
          if (-not (Test-Path $makensis)) { throw "makensis.exe not found." }
          $selectedFeatures = New-Object System.Collections.Generic.List[string]
          if ($env:IS_BETA -eq 'true') {
            if ([string]::IsNullOrWhiteSpace($env:BETA_FEATURES)) {
              throw "Beta tag did not select any module installers."
            }
            foreach ($entry in $env:BETA_FEATURES.Split(',')) {
              $name = $entry.Trim()
              if (-not [string]::IsNullOrWhiteSpace($name)) {
                [void] $selectedFeatures.Add($name)
              }
            }
          }
          # Same disabled-in-release filter the zip step uses, so a feature
          # marked unstable doesn't get a per-feature installer either.
          $allFeatures = @(
            [pscustomobject]@{ Name = 'Calibration';  Slug = 'calibration' }
            [pscustomobject]@{ Name = 'Smoothing';    Slug = 'smoothing' }
            [pscustomobject]@{ Name = 'InputHealth';  Slug = 'inputhealth' }
            [pscustomobject]@{ Name = 'FaceTracking'; Slug = 'facetracking' }
            [pscustomobject]@{ Name = 'OSCRouter';    Slug = 'oscrouter' }
            [pscustomobject]@{ Name = 'QuestApp';     Slug = 'questapp' }
            [pscustomobject]@{ Name = 'Captions';     Slug = 'captions' }
          )
          $features = $allFeatures | Where-Object {
            $marker = "modules/$($_.Slug)/disabled-in-release.flag"
            if (Test-Path -LiteralPath $marker) {
              Write-Host "Skipping per-feature installer for $($_.Name) ($marker present)"
              return $false
            }
            if ($selectedFeatures.Count -gt 0 -and -not $selectedFeatures.Contains($_.Name)) {
              Write-Host "Skipping per-feature installer for $($_.Name) (unchanged for beta tag)"
              return $false
            }
            return $true
          } | ForEach-Object { $_.Name }
          $outputs = @{}
          foreach ($feat in $features) {
            Push-Location install
            & $makensis "/DVERSION=$version" "/DFEATURE=$feat" installer.nsi
            $exitCode = $LASTEXITCODE
            Pop-Location
            if ($exitCode -ne 0) { throw "makensis ($feat) exited $exitCode" }
            $raw = "build/artifacts/Release/WKOpenVR-$feat-Setup.exe"
            if (-not (Test-Path $raw)) { throw "expected $raw missing after makensis" }
            New-Item -ItemType Directory -Force -Path "release" | Out-Null
            $versioned = "release/WKOpenVR-$feat-v$version-Setup.exe"
            Move-Item $raw $versioned -Force
            $hash = (Get-FileHash $versioned -Algorithm SHA256).Hash
            $outputs[$feat] = (Resolve-Path $versioned).Path
            Write-Host "Per-feature installer ($feat): $versioned sha256=$hash"
          }
          "installer_calibration=$($outputs['Calibration'])"   >> $env:GITHUB_OUTPUT
          "installer_smoothing=$($outputs['Smoothing'])"       >> $env:GITHUB_OUTPUT
          "installer_inputhealth=$($outputs['InputHealth'])"   >> $env:GITHUB_OUTPUT
          "installer_facetracking=$($outputs['FaceTracking'])" >> $env:GITHUB_OUTPUT
          "installer_oscrouter=$($outputs['OSCRouter'])"       >> $env:GITHUB_OUTPUT
          "installer_questapp=$($outputs['QuestApp'])"         >> $env:GITHUB_OUTPUT
          "installer_captions=$($outputs['Captions'])"         >> $env:GITHUB_OUTPUT

      - name: Publish module releases
        id: publish
        env:
          GH_TOKEN: ${{ secrets.MIRROR_RELEASE_TOKEN }}
          # Per-feature installer paths. A disabled-in-release module output
          # is empty here; the loop filters those entries out so gh release
          # create never sees an empty positional arg.
          INSTALLER_CALIBRATION:  ${{ steps.feature_installers.outputs.installer_calibration }}
          INSTALLER_SMOOTHING:    ${{ steps.feature_installers.outputs.installer_smoothing }}
          INSTALLER_INPUTHEALTH:  ${{ steps.feature_installers.outputs.installer_inputhealth }}
          INSTALLER_FACETRACKING: ${{ steps.feature_installers.outputs.installer_facetracking }}
          INSTALLER_OSCROUTER:    ${{ steps.feature_installers.outputs.installer_oscrouter }}
          INSTALLER_QUESTAPP:     ${{ steps.feature_installers.outputs.installer_questapp }}
          INSTALLER_CAPTIONS:     ${{ steps.feature_installers.outputs.installer_captions }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            throw "MIRROR_RELEASE_TOKEN secret is required to publish module releases."
          }

          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $cleanupPath = Join-Path $env:RUNNER_TEMP 'module-release-cleanup.txt'
          if (Test-Path -LiteralPath $cleanupPath) { Remove-Item -LiteralPath $cleanupPath -Force }
          New-Item -ItemType File -Path $cleanupPath -Force | Out-Null
          "cleanup_path=$cleanupPath" >> $env:GITHUB_OUTPUT

          $moduleReleases = @(
            [pscustomobject]@{ Feature = 'Calibration';  DisplayName = 'Space Calibrator'; Repo = 'RealWhyKnot/WKOpenVR-SpaceCalibrator'; Path = $env:INSTALLER_CALIBRATION }
            [pscustomobject]@{ Feature = 'Smoothing';    DisplayName = 'Smoothing';        Repo = 'RealWhyKnot/WKOpenVR-Smoothing';        Path = $env:INSTALLER_SMOOTHING }
            [pscustomobject]@{ Feature = 'InputHealth';  DisplayName = 'Input Health';     Repo = 'RealWhyKnot/WKOpenVR-InputHealth';      Path = $env:INSTALLER_INPUTHEALTH }
            [pscustomobject]@{ Feature = 'FaceTracking'; DisplayName = 'Face Tracking';    Repo = 'RealWhyKnot/WKOpenVR-FaceTracking';     Path = $env:INSTALLER_FACETRACKING }
            [pscustomobject]@{ Feature = 'OSCRouter';    DisplayName = 'OSC Router';       Repo = 'RealWhyKnot/WKOpenVR-OSCRouter';        Path = $env:INSTALLER_OSCROUTER }
            [pscustomobject]@{ Feature = 'QuestApp';     DisplayName = 'Quest App';        Repo = 'RealWhyKnot/WKOpenVR-QuestApp';         Path = $env:INSTALLER_QUESTAPP }
            [pscustomobject]@{ Feature = 'Captions';     DisplayName = 'Captions';         Repo = 'RealWhyKnot/WKOpenVR-Captions';         Path = $env:INSTALLER_CAPTIONS }
          )

          $published = 0
          foreach ($item in $moduleReleases) {
            if ([string]::IsNullOrWhiteSpace($item.Path)) {
              Write-Host "Skipping module release for $($item.Feature); installer was not produced."
              continue
            }

            $installerPath = $item.Path
            if (-not (Test-Path -LiteralPath $installerPath)) {
              throw "Installer path missing for $($item.Feature): $installerPath"
            }

            gh repo view $item.Repo --json nameWithOwner | Out-Null
            if ($LASTEXITCODE -ne 0) { throw "Module repo unavailable: $($item.Repo)" }

            $file = Get-Item -LiteralPath $installerPath
            $hash = (Get-FileHash -LiteralPath $installerPath -Algorithm SHA256).Hash
            $notesPath = Join-Path $env:RUNNER_TEMP ("release-notes-" + $item.Feature + ".md")
            $notesLines = @(
              "# $($item.DisplayName) $tag",
              "",
              "$($item.DisplayName) installer for WKOpenVR $version.",
              "",
              "Run this Setup.exe to install WKOpenVR and enable $($item.DisplayName).",
              "Other WKOpenVR modules can be enabled from the Modules tab or by running another module installer.",
              "",
              "SHA256: $hash"
            )
            $notes = [string]::Join([System.Environment]::NewLine, $notesLines) + [System.Environment]::NewLine
            $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
            [System.IO.File]::WriteAllText($notesPath, $notes, $utf8NoBom)

            $existing = & gh release view $tag --repo $item.Repo --json id 2>$null
            if ($LASTEXITCODE -eq 0 -and $existing) {
              Write-Host "Deleting existing module release $tag on $($item.Repo) before retry."
              gh release delete $tag --repo $item.Repo --yes
              if ($LASTEXITCODE -ne 0) { throw "Could not delete existing release $tag on $($item.Repo)" }
            }

            Add-Content -LiteralPath $cleanupPath -Value $item.Repo
            $extra = @()
            if ('${{ steps.beta.outputs.is_beta }}' -eq 'true') { $extra = @('--prerelease','--latest=false') }
            Write-Host "Publishing $($file.Name) to $($item.Repo) ($($file.Length) bytes) sha256=$hash"
            gh release create $tag --repo $item.Repo --target main --title $tag --notes-file $notesPath @extra $installerPath
            if ($LASTEXITCODE -ne 0) { throw "gh release create failed for $($item.Repo)" }

            $expectedDigest = "sha256:$($hash.ToLowerInvariant())"
            $assetDigest = $null
            for ($attempt = 1; $attempt -le 6; $attempt++) {
              $releaseJson = gh api "repos/$($item.Repo)/releases/tags/$tag" 2>$null
              if ($LASTEXITCODE -eq 0 -and $releaseJson) {
                $release = $releaseJson | ConvertFrom-Json
                $asset = $release.assets | Where-Object { $_.name -eq $file.Name } | Select-Object -First 1
                if ($asset -and $asset.digest) {
                  $assetDigest = [string]$asset.digest
                  break
                }
              }
              Start-Sleep -Seconds 2
            }
            if ([string]::IsNullOrWhiteSpace($assetDigest)) {
              throw "GitHub did not report a digest for $($file.Name) on $($item.Repo)."
            }
            if ($assetDigest.ToLowerInvariant() -ne $expectedDigest) {
              throw "Uploaded asset digest mismatch for $($file.Name): expected $expectedDigest got $assetDigest"
            }
            Write-Host "Verified uploaded asset digest: $assetDigest"
            $published++
          }

          if ($published -eq 0) { throw "No module releases were published." }

      - name: Push promoted changelog back to main (verified)
        if: ${{ steps.beta.outputs.is_beta != 'true' }}
        # Use the GraphQL createCommitOnBranch mutation so the promotion
        # commit is signed server-side with GitHub's bot key. Done last so a
        # build or release failure does not push a phantom-promoted CHANGELOG.
        # `continue-on-error` because this is post-publish housekeeping --
        # the module releases are already up by this point, so a stale-OID
        # race against changelog-append landing on main mid-build must not
        # cascade into the cleanup step deleting otherwise-valid releases.
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git fetch origin main
          if cmp -s .changelog-stash/CHANGELOG.md <(git show origin/main:CHANGELOG.md); then
            echo "Nothing to promote -- main already carries the promoted bytes."
            exit 0
          fi

          # Build the GraphQL payload in Python so neither bash nor jq
          # ever sees the base64-encoded CHANGELOG bytes as argv. The
          # earlier `jq -n --arg changelog "$changelog_b64"` form hit
          # /c/ProgramData/Chocolatey/bin/jq:
          # Argument list too long on a v2026.5.17.0 attempt when
          # CHANGELOG.md exceeded Git Bash's Win32 argv ceiling. Python reads
          # the file, base64-encodes, dumps the JSON to a temp file, then
          # `gh api graphql --input <file>` so the payload never travels
          # through argv.
          python3 - <<'PY' > "$RUNNER_TEMP/changelog-payload.json"
          import base64, json, os, subprocess, sys

          repo = os.environ["GITHUB_REPOSITORY"]
          tag  = os.environ["TAG_NAME"]
          expected_oid = subprocess.check_output(
              ["git", "rev-parse", "origin/main"], text=True
          ).strip()

          def b64(path):
              with open(path, "rb") as f:
                  return base64.b64encode(f.read()).decode("ascii")

          changelog_b64 = b64(".changelog-stash/CHANGELOG.md")
          print(
              f"payload size (base64 chars): changelog={len(changelog_b64)}",
              file=sys.stderr,
          )

          payload = {
              "query": (
                  "mutation($input: CreateCommitOnBranchInput!) {"
                  " createCommitOnBranch(input: $input)"
                  " { commit { oid url } } }"
              ),
              "variables": {
                  "input": {
                      "branch": {
                          "repositoryNameWithOwner": repo,
                          "branchName": "main",
                      },
                      "message": {
                          "headline": f"docs(changelog): promote Unreleased -> {tag} [skip changelog]",
                          "body":     f"Promoted by .github/workflows/release.yml after publishing {tag}.",
                      },
                      "fileChanges": {
                          "additions": [
                              {"path": "CHANGELOG.md", "contents": changelog_b64},
                          ],
                      },
                      "expectedHeadOid": expected_oid,
                  },
              },
          }
          json.dump(payload, sys.stdout)
          PY

          response=$(gh api graphql --input "$RUNNER_TEMP/changelog-payload.json")
          rm -f "$RUNNER_TEMP/changelog-payload.json"
          echo "$response" | jq .

          if echo "$response" | jq -e '.errors // empty' >/dev/null; then
            echo "::error::createCommitOnBranch returned GraphQL errors"
            exit 1
          fi

          new_oid=$(echo "$response" | jq -r '.data.createCommitOnBranch.commit.oid')
          if [[ -z "$new_oid" || "$new_oid" == "null" ]]; then
            echo "::error::createCommitOnBranch did not return a commit oid"
            exit 1
          fi

          verified=$(gh api "repos/$GITHUB_REPOSITORY/commits/$new_oid" --jq '.commit.verification.verified')
          if [[ "$verified" != "true" ]]; then
            echo "::error::Commit $new_oid is not verified (got: $verified)"
            gh api "repos/$GITHUB_REPOSITORY/commits/$new_oid" --jq '.commit.verification'
            exit 1
          fi
          echo "Verified promote commit: $new_oid"

      - name: Clean up partial release on failure
        # Delete only module releases that this workflow attempted to create.
        # Leave tags intact so the source repo tag and module repo tags remain
        # available for inspection after a failed run.
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.MIRROR_RELEASE_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            Write-Host "::warning::MIRROR_RELEASE_TOKEN secret is unavailable; skipping module release cleanup."
            $global:LASTEXITCODE = 0
            return
          }

          $tag = $env:TAG_NAME
          $cleanupPath = "${{ steps.publish.outputs.cleanup_path }}"
          if ([string]::IsNullOrWhiteSpace($cleanupPath) -or -not (Test-Path -LiteralPath $cleanupPath)) {
            Write-Host "Cleanup: no module release cleanup list was written."
            $global:LASTEXITCODE = 0
            return
          }

          $repos = Get-Content -LiteralPath $cleanupPath | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -Unique
          foreach ($repo in $repos) {
            $exists = gh release view $tag --repo $repo --json id 2>$null
            if ($LASTEXITCODE -eq 0 -and $exists) {
              Write-Host "Cleanup: deleting module release $tag from $repo."
              gh release delete $tag --repo $repo --yes
              if ($LASTEXITCODE -ne 0) {
                Write-Host "::warning::Could not auto-delete module release $tag on $repo. Manual cleanup may be needed before retrying."
              }
            } else {
              Write-Host "Cleanup: no module release $tag on $repo -- nothing to remove."
            }
          }

          # `gh release view` on a non-existent release returns 1; reset so
          # a clean cleanup pass is reported as a clean step.
          $global:LASTEXITCODE = 0
