# This workflow publishes a release on this repo AND mirrors per-feature
# zips to the seven sibling repos (WKOpenVR-SpaceCalibrator,
# WKOpenVR-Smoothing, WKOpenVR-InputHealth, WKOpenVR-VRCFT,
# WKOpenVR-OSCRouter, WKOpenVR-Captions, WKOpenVR-Phantom). The mirror step
# needs a token with contents:write on all seven repos, stored as the
# secret MIRROR_RELEASE_TOKEN. Provision via:
#   1. github.com -> Settings -> Developer settings -> Fine-grained PAT
#   2. Resource owner: RealWhyKnot. Repos: WKOpenVR-SpaceCalibrator,
#      WKOpenVR-Smoothing, WKOpenVR-InputHealth, WKOpenVR-VRCFT,
#      WKOpenVR-OSCRouter, WKOpenVR-Captions, WKOpenVR-Phantom.
#   3. Permissions: Contents = Read and write.
#   4. Copy token, then in this repo: Settings -> Secrets and variables
#      -> Actions -> New repository secret -> name MIRROR_RELEASE_TOKEN.
# Without this secret, the umbrella release publishes successfully but
# the mirror steps fail (acceptable for a smoke test; fix before promoting).
#
# Modules carrying modules/<slug>/disabled-in-release.flag are filtered
# out of the per-feature zip and installer loops below and their mirror
# step is skipped via an `if:` guard, so an unstable feature never lands
# on its sibling repo even when MIRROR_RELEASE_TOKEN covers it.

name: Release

# Triggered by pushing a tag like v2026.5.12.0. Builds the umbrella binary
# (WKOpenVR.exe), driver (driver_wkopenvr.dll), the C# face-tracking host
# (WKOpenVR.FaceModuleHost.exe), and the native captions host
# (WKOpenVR.CaptionsHost.exe) via CMake + MSVC + dotnet publish, runs
# the test suite, packages an umbrella zip and five per-feature mirror zips,
# publishes the umbrella release on this repo, and pushes a mirror release
# to each sibling repo.
#
# Changelog promotion: before the build, Update-Changelog.ps1 renames the
# "## Unreleased" heading to "## [vTAG] -- DATE". After the GitHub release
# is created those promoted files are pushed back to main via the GraphQL
# createCommitOnBranch mutation (signed server-side).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Share a concurrency group with changelog-append so the appender can't run
# during a release and add entries to main's Unreleased that the release
# itself doesn't contain.
concurrency:
  group: changelog-append
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate workflow / script PowerShell syntax
        # Fails the run in seconds if any committed .ps1 or inline pwsh
        # block in the workflow YAML has a parser error. Designed to
        # catch the class of latent bug that took down v2026.5.13.0
        # twice in a row (a `$Var:` interpolation that never reached
        # the executed branch until release time, and a similar
        # construct in a feature-removal commit).
        shell: pwsh
        run: |
          ./.github/scripts/Test-WorkflowSyntax.ps1

      - name: Promote Unreleased -> tagged section
        shell: pwsh
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ./.github/scripts/Update-Changelog.ps1 -Mode Promote -Version '${{ github.ref_name }}'
          New-Item -ItemType Directory -Force -Path .changelog-stash/wiki | Out-Null
          Copy-Item CHANGELOG.md       .changelog-stash/CHANGELOG.md       -Force
          Copy-Item wiki/Changelog.md  .changelog-stash/wiki/Changelog.md  -Force

      - name: Set up .NET 10 SDK
        # FaceModuleHost is a .NET 10 sidecar (pinned by
        # modules/facetracking/src/host/global.json). Without an explicit
        # setup the runner's default dotnet may not include 10.x, which
        # makes the CMake host target silently skip itself via
        # `if(NOT DOTNET_EXECUTABLE) return()` -- the build "succeeds" but
        # the installer would ship without the face-tracking host process.
        # Pinning here means a future runner-image change still produces
        # the same artifact set.
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache build directory
        # CMake handles incremental builds natively. Caching build/ between
        # runs cuts a cold ~6 min MSVC pass down to ~1 min when only a few
        # files changed since the last successful run. The restore-keys
        # fallback lets a near-miss (different source hash) reuse the
        # most recent build state -- CMake then recompiles only what
        # changed.
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'core/src/**/*.cpp', 'core/src/**/*.h', 'modules/**/*.cpp', 'modules/**/*.h', 'modules/**/*.cs', '.gitmodules', 'version.txt') }}
          restore-keys: |
            build-${{ runner.os }}-

      - name: Cache NuGet packages
        # FaceModuleHost's dotnet publish restores NuGet packages on every
        # cold run. Caching the user-level NuGet folder keeps them warm.
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('modules/facetracking/src/host/**/*.csproj', 'modules/facetracking/src/host/**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache NSIS install
        # Skips the ~30 s choco install on warm runs. Key bumped on NSIS
        # upgrades.
        uses: actions/cache@v4
        with:
          path: 'C:\Program Files (x86)\NSIS'
          key: nsis-${{ runner.os }}-3.12

      - name: Stamp generated headers + gl3w sources
        # CMake registers the three gitignored channel headers as sources, so
        # they must exist BEFORE the Configure step or CMake aborts with
        # "No SOURCES given to target: openvr_pair_common". The same step
        # pre-runs lib/gl3w's generator (with retry) so the runner's
        # one-time Khronos download race doesn't kill the configure either.
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:TAG_NAME -replace '^v', ''
          Set-Content -Path version.txt -Value $version -NoNewline

          $CommonBuildChannel = "core/src/common/BuildChannel.h"
          if (Test-Path (Split-Path -Parent $CommonBuildChannel)) {
            Set-Content -Path $CommonBuildChannel -Value @"
          // Overwritten by release.yml with the umbrella binary's per-build stamp.
          #pragma once

          #define WKOPENVR_BUILD_STAMP "$version"
          #define WKOPENVR_BUILD_CHANNEL "release"
          "@
          }

          $ScBuildStamp = "modules/calibration/src/overlay/BuildStamp.h"
          if (Test-Path (Split-Path -Parent $ScBuildStamp)) {
            # Indent the here-string contents to match the surrounding YAML
            # block scalar indent (10 spaces). YAML strips the common indent
            # before the runner sees the script, so PowerShell receives a
            # column-0 here-string that satisfies the "@ at column 0 rule.
            Set-Content -Path $ScBuildStamp -Value @"
          // Overwritten by release.yml with the umbrella binary's per-build stamp.
          #pragma once

          #define SPACECAL_BUILD_STAMP "$version"
          #define SPACECAL_BUILD_CHANNEL "release"
          "@
          }

          $FtBuildStamp = "modules/facetracking/src/overlay/BuildStamp.h"
          if (Test-Path (Split-Path -Parent $FtBuildStamp)) {
            Set-Content -Path $FtBuildStamp -Value @"
          // Overwritten by release.yml with the umbrella binary's per-build stamp.
          #pragma once

          #define FACETRACKING_BUILD_STAMP "$version"
          #define FACETRACKING_BUILD_CHANNEL "release"
          "@
          }

          # gl3w_gen.py fetches the Khronos OpenGL registry to generate
          # include/GL/gl3w.h + src/gl3w.c. The Khronos endpoint occasionally
          # returns 403 to the runner's default urllib User-Agent. Retry up
          # to 3 times with backoff so a transient block doesn't break the
          # release. CMake's gl3w block only invokes the generator when the
          # output files are missing, so doing it here is idempotent.
          $gl3wH = "lib/gl3w/include/GL/gl3w.h"
          $gl3wC = "lib/gl3w/src/gl3w.c"
          if (-not (Test-Path $gl3wH) -or -not (Test-Path $gl3wC)) {
            Push-Location lib/gl3w
            $maxAttempts = 3
            $attempt = 1
            while ($attempt -le $maxAttempts) {
              Write-Host "gl3w_gen.py attempt $attempt/$maxAttempts..."
              python gl3w_gen.py
              if ($LASTEXITCODE -eq 0 -and (Test-Path "include/GL/gl3w.h") -and (Test-Path "src/gl3w.c")) {
                Write-Host "gl3w sources generated on attempt $attempt"
                break
              }
              if ($attempt -lt $maxAttempts) {
                Write-Host "gl3w_gen.py failed (exit $LASTEXITCODE); sleeping 15s before retry..."
                Start-Sleep -Seconds 15
              }
              $attempt++
            }
            Pop-Location
            if (-not (Test-Path $gl3wH) -or -not (Test-Path $gl3wC)) {
              throw "gl3w_gen.py failed after $maxAttempts attempts. Khronos OpenGL registry blocked or unavailable. Re-run the workflow once the network clears."
            }
          } else {
            Write-Host "gl3w sources already present at $gl3wH and $gl3wC -- skipping generator."
          }

      - name: Configure
        # The minhook submodule declares cmake_minimum_required(2.8.12) which
        # CMake 4.x rejects. -DCMAKE_POLICY_VERSION_MINIMUM=3.5 lets us configure
        # without forking. -Wno-dev silences developer-mode warnings from minhook.
        run: cmake -G "Visual Studio 17 2022" -A x64 -B build -S . -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DWKOPENVR_CAPTIONS_CUDA=OFF -DWKOPENVR_RELEASE_BUILD=ON -Wno-dev

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel
          if ($LASTEXITCODE -ne 0) { throw "Build failed (exit $LASTEXITCODE)" }

      - name: Run tests
        shell: pwsh
        run: |
          $tests = Get-ChildItem build/artifacts/Release/*_tests.exe
          if ($tests.Count -eq 0) { throw "No test binaries found" }
          foreach ($t in $tests) {
            Write-Host "Running $($t.Name)..."
            & $t.FullName --gtest_brief=1
            if ($LASTEXITCODE -ne 0) { throw "$($t.Name) failed (exit $LASTEXITCODE)" }
          }

      - name: Run captions host self-test
        if: ${{ hashFiles('modules/captions/disabled-in-release.flag') == '' }}
        shell: pwsh
        run: |
          $hostExe = 'build/driver_wkopenvr/resources/captions/host/WKOpenVR.CaptionsHost.exe'
          if (-not (Test-Path -LiteralPath $hostExe)) {
            throw "Captions host missing at $hostExe"
          }
          & $hostExe --self-test
          if ($LASTEXITCODE -ne 0) { throw "Captions host self-test failed (exit $LASTEXITCODE)" }

      - name: Package umbrella and mirror zips
        id: zips
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $version   = $env:TAG_NAME -replace '^v', ''
          $artifacts = "build/artifacts/Release"
          $driverSrc = "build/driver_wkopenvr"

          if (-not (Test-Path "$artifacts/WKOpenVR.exe")) {
            throw "WKOpenVR.exe not found at $artifacts"
          }
          if (-not (Test-Path "$driverSrc/bin/win64/driver_wkopenvr.dll")) {
            throw "driver_wkopenvr.dll not found at $driverSrc/bin/win64"
          }
          if (-not (Test-Path "$artifacts/manifest.vrmanifest")) {
            throw "manifest.vrmanifest not found at $artifacts (build step copies it from core/src/overlay/)"
          }

          # --- Assemble the driver tree into a staging directory ----------
          # The installer convention: the DLL is renamed driver_01wkopenvr.dll
          # so SteamVR's alphabetic-sort loads it after any existing drivers.
          $stage = "release/_stage_$version"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Force -Path "$stage/driver_wkopenvr/bin/win64" | Out-Null
          New-Item -ItemType Directory -Force -Path "$stage/driver_wkopenvr/resources/settings" | Out-Null

          Copy-Item "$driverSrc/driver.vrdrivermanifest"                  "$stage/driver_wkopenvr/driver.vrdrivermanifest"
          Copy-Item "$driverSrc/resources/driver.vrresources"              "$stage/driver_wkopenvr/resources/driver.vrresources"
          Copy-Item "$driverSrc/resources/settings/default.vrsettings"    "$stage/driver_wkopenvr/resources/settings/default.vrsettings"
          Copy-Item "$driverSrc/bin/win64/driver_wkopenvr.dll"           "$stage/driver_wkopenvr/bin/win64/driver_01wkopenvr.dll"

          $srcFt = "$driverSrc/resources/facetracking"
          if (Test-Path $srcFt) {
            Copy-Item -Recurse -Path $srcFt -Destination "$stage/driver_wkopenvr/resources/facetracking"
          }

          $srcTr = "$driverSrc/resources/captions"
          if (Test-Path $srcTr) {
            Copy-Item -Recurse -Path $srcTr -Destination "$stage/driver_wkopenvr/resources/captions"
          }

          if (-not (Test-Path "$artifacts/dashboard_icon.png")) {
            throw "dashboard_icon.png not found at $artifacts"
          }
          if (-not (Test-Path "$artifacts/resources/face-module-sync.ps1")) {
            throw "face-module-sync.ps1 not found at $artifacts/resources"
          }

          Copy-Item "$artifacts/WKOpenVR.exe"        "$stage/WKOpenVR.exe"
          Copy-Item "$artifacts/openvr_api.dll"      "$stage/openvr_api.dll"
          # manifest.vrmanifest is what RegisterApplicationManifest in
          # WKOpenVR.exe loads on first launch to register the overlay with
          # SteamVR. Zip-extract users would get no SteamVR autolaunch
          # without it.
          Copy-Item "$artifacts/manifest.vrmanifest" "$stage/manifest.vrmanifest"
          Copy-Item "$artifacts/dashboard_icon.png"  "$stage/dashboard_icon.png"
          New-Item -ItemType Directory -Force -Path "$stage/resources" | Out-Null
          Copy-Item "$artifacts/resources/face-module-sync.ps1" "$stage/resources/face-module-sync.ps1"

          # Disabled-in-release markers gate every per-module artifact below.
          # A disabled module's CMake helper short-circuited add_subdirectory,
          # so the build never produced the host exes / input profiles to stage.
          $faceTrackingEnabled = -not (Test-Path -LiteralPath 'modules/facetracking/disabled-in-release.flag')
          $captionsEnabled     = -not (Test-Path -LiteralPath 'modules/captions/disabled-in-release.flag')
          $phantomEnabled      = -not (Test-Path -LiteralPath 'modules/phantom/disabled-in-release.flag')

          # Stage the C# face-tracking host. CMake publishes it to
          # build/artifacts/FaceModuleHost/; the workflow runs cmake directly
          # so we copy it into the stage here. The driver's HostSupervisor
          # resolves the host exe relative to the driver's own resources directory.
          if ($faceTrackingEnabled) {
            $faceHostBuildDir = "build/artifacts/FaceModuleHost"
            $faceHostStageDir = "$stage/driver_wkopenvr/resources/facetracking/host"
            if (-not (Test-Path $faceHostBuildDir)) {
              throw "Face-tracking host build output missing at $faceHostBuildDir (was OPENVR_PAIR_BUILD_FACE_HOST=OFF or did dotnet publish fail?)"
            }
            New-Item -ItemType Directory -Force -Path $faceHostStageDir | Out-Null
            Copy-Item -Recurse -Force -Path "$faceHostBuildDir\*" -Destination $faceHostStageDir
            if (-not (Test-Path "$faceHostStageDir/WKOpenVR.FaceModuleHost.exe")) {
              throw "Staged WKOpenVR.FaceModuleHost.exe missing under $faceHostStageDir."
            }
          } else {
            Write-Host "Face-tracking host staging skipped (modules/facetracking/disabled-in-release.flag)."
          }

          # Stage the native captions host. CMake emits it to
          # build/driver_wkopenvr/resources/captions/host/ (same driver-tree
          # layout that quick.ps1 deploys). The $srcTr block above already
          # copied the captions resources tree into the stage; this block
          # verifies the host exe landed correctly so a missing CaptionsHost
          # build is caught early with a clear message rather than a silent
          # gap in the release zip.
          if ($captionsEnabled) {
            $trHostStageExe = "$stage/driver_wkopenvr/resources/captions/host/WKOpenVR.CaptionsHost.exe"
            if (-not (Test-Path $trHostStageExe)) {
              throw "WKOpenVR.CaptionsHost.exe missing from stage at $trHostStageExe. Check that OPENVR_PAIR_BUILD_CAPTIONS_HOST is ON and the captions host CMake target built successfully."
            }
            $trHostOpenVr = "$stage/driver_wkopenvr/resources/captions/host/openvr_api.dll"
            if (-not (Test-Path $trHostOpenVr)) {
              throw "openvr_api.dll missing beside CaptionsHost at $trHostOpenVr."
            }
            $trPackManifest = "$stage/driver_wkopenvr/resources/captions/host/resources/captions-packs.json"
            if (-not (Test-Path $trPackManifest)) {
              throw "Captions pack manifest missing from stage at $trPackManifest."
            }
          } else {
            Write-Host "Captions host staging skipped (modules/captions/disabled-in-release.flag)."
          }

          New-Item -ItemType Directory -Force -Path "release" | Out-Null

          # Helper: build a zip + manifest for a given staging directory.
          function New-ReleaseZip {
            param([string]$StageDir, [string]$ZipPath)
            if (Test-Path $ZipPath) { Remove-Item $ZipPath -Force }
            Compress-Archive -Path "$StageDir/*" -DestinationPath $ZipPath -CompressionLevel Optimal
            $item     = Get-Item $ZipPath
            $hash     = (Get-FileHash $ZipPath -Algorithm SHA256).Hash
            $rootLen  = (Resolve-Path $StageDir).Path.Length + 1
            $rows     = Get-ChildItem $StageDir -Recurse -File | ForEach-Object {
              $rel = $_.FullName.Substring($rootLen).Replace('\', '/')
              $h   = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
              "{0}`t{1}`t{2}" -f $h, $_.Length, $rel
            }
            $maniPath = [IO.Path]::ChangeExtension($ZipPath, "manifest.tsv") -replace '\.zip\.manifest', '.manifest'
            $enc = [System.Text.UTF8Encoding]::new($false)
            [System.IO.File]::WriteAllLines((Resolve-Path (Split-Path $maniPath)).Path + "\" + (Split-Path -Leaf $maniPath), $rows, $enc)
            return [pscustomobject]@{
              Path     = (Resolve-Path $ZipPath).Path
              Name     = $item.Name
              Size     = $item.Length
              Sha256   = $hash
              Manifest = (Resolve-Path $maniPath).Path
            }
          }

          # --- Umbrella zip (all three flag files absent; installer drops them) ---
          $umbrellaZipPath = "release/WKOpenVR-$version.zip"
          $umbrella = New-ReleaseZip -StageDir $stage -ZipPath $umbrellaZipPath
          Write-Host "Umbrella zip: $($umbrella.Name) ($($umbrella.Size) bytes) sha256=$($umbrella.Sha256)"

          # --- Per-feature mirror zips ----------------------------------------
          # Each mirror zip is identical to the umbrella plus one flag file
          # pre-dropped in driver_wkopenvr/resources/ so the user's SteamVR
          # picks up that feature immediately after extracting into the driver dir.
          # Slug = modules/<slug>/ folder name (and the marker filename root).
          # Any feature whose source tree carries disabled-in-release.flag is
          # filtered out below so it never gets a zip, installer, or mirror
          # push -- the same marker the CMake helper uses to skip linking the
          # module into the release binary.
          $allFeatures = @(
            [pscustomobject]@{ Name = 'Calibration';  Slug = 'calibration';  Flag = 'enable_calibration.flag';  Repo = 'RealWhyKnot/WKOpenVR-SpaceCalibrator' }
            [pscustomobject]@{ Name = 'Smoothing';    Slug = 'smoothing';    Flag = 'enable_smoothing.flag';    Repo = 'RealWhyKnot/WKOpenVR-Smoothing' }
            [pscustomobject]@{ Name = 'InputHealth';  Slug = 'inputhealth';  Flag = 'enable_inputhealth.flag';  Repo = 'RealWhyKnot/WKOpenVR-InputHealth' }
            [pscustomobject]@{ Name = 'FaceTracking'; Slug = 'facetracking'; Flag = 'enable_facetracking.flag'; Repo = 'RealWhyKnot/WKOpenVR-VRCFT' }
            [pscustomobject]@{ Name = 'OSCRouter';    Slug = 'oscrouter';    Flag = 'enable_oscrouter.flag';    Repo = 'RealWhyKnot/WKOpenVR-OSCRouter' }
            [pscustomobject]@{ Name = 'Captions';     Slug = 'captions';     Flag = 'enable_captions.flag';     Repo = 'RealWhyKnot/WKOpenVR-Captions' }
            [pscustomobject]@{ Name = 'Phantom';      Slug = 'phantom';      Flag = 'enable_phantom.flag';      Repo = 'RealWhyKnot/WKOpenVR-Phantom' }
          )
          $features = $allFeatures | Where-Object {
            $marker = "modules/$($_.Slug)/disabled-in-release.flag"
            if (Test-Path -LiteralPath $marker) {
              Write-Host "Skipping mirror zip for $($_.Name) ($marker present)"
              return $false
            }
            return $true
          }

          $mirrorPaths = @{}
          foreach ($feat in $features) {
            $flagFile = "$stage/driver_wkopenvr/resources/$($feat.Flag)"
            New-Item -ItemType File -Force -Path $flagFile | Out-Null
            $zipPath = "release/WKOpenVR-$($feat.Name)-$version.zip"
            $z = New-ReleaseZip -StageDir $stage -ZipPath $zipPath
            $mirrorPaths[$feat.Name] = $z.Path
            Write-Host "Mirror zip ($($feat.Name)): $($z.Name) ($($z.Size) bytes)"
            Remove-Item $flagFile -Force
          }

          Remove-Item -Recurse -Force $stage

          # Emit outputs for downstream steps. Disabled features land as empty
          # strings; the matching Mirror release step uses `if:` to skip when
          # the output is empty.
          "umbrella_path=$($umbrella.Path)"         >> $env:GITHUB_OUTPUT
          "umbrella_name=$($umbrella.Name)"         >> $env:GITHUB_OUTPUT
          "umbrella_size=$($umbrella.Size)"         >> $env:GITHUB_OUTPUT
          "umbrella_sha256=$($umbrella.Sha256)"     >> $env:GITHUB_OUTPUT
          "umbrella_manifest=$($umbrella.Manifest)" >> $env:GITHUB_OUTPUT
          "mirror_calibration=$($mirrorPaths['Calibration'])"   >> $env:GITHUB_OUTPUT
          "mirror_smoothing=$($mirrorPaths['Smoothing'])"       >> $env:GITHUB_OUTPUT
          "mirror_inputhealth=$($mirrorPaths['InputHealth'])"   >> $env:GITHUB_OUTPUT
          "mirror_facetracking=$($mirrorPaths['FaceTracking'])" >> $env:GITHUB_OUTPUT
          "mirror_oscrouter=$($mirrorPaths['OSCRouter'])"       >> $env:GITHUB_OUTPUT
          "mirror_captions=$($mirrorPaths['Captions'])"         >> $env:GITHUB_OUTPUT
          "mirror_phantom=$($mirrorPaths['Phantom'])"           >> $env:GITHUB_OUTPUT

      - name: Verify NSIS input artifacts staged
        # makensis errors with an obscure "no files found" when File /r is
        # pointed at an empty or missing directory. Failing here with the
        # exact missing path makes future staging gaps trivial to diagnose
        # instead of leaving the user to read the makensis output.
        shell: pwsh
        run: |
          $required = [System.Collections.Generic.List[string]]@(
            'build/artifacts/Release/WKOpenVR.exe',
            'build/artifacts/Release/openvr_api.dll',
            'build/artifacts/Release/manifest.vrmanifest',
            'build/artifacts/Release/dashboard_icon.png',
            'build/artifacts/Release/resources/face-module-sync.ps1',
            'build/driver_wkopenvr/driver.vrdrivermanifest',
            'build/driver_wkopenvr/resources/driver.vrresources',
            'build/driver_wkopenvr/resources/settings/default.vrsettings',
            'build/driver_wkopenvr/bin/win64/driver_wkopenvr.dll'
          )
          # Per-module artifacts: only verify the ones whose modules are
          # actually built into this release (the disabled-in-release marker
          # tells the CMake helper to skip add_subdirectory for those, so
          # their host exes / input profiles never get produced).
          if (-not (Test-Path -LiteralPath 'modules/facetracking/disabled-in-release.flag')) {
            $required.Add('build/driver_wkopenvr/resources/facetracking/host/WKOpenVR.FaceModuleHost.exe')
          }
          if (-not (Test-Path -LiteralPath 'modules/captions/disabled-in-release.flag')) {
            $required.Add('build/driver_wkopenvr/resources/captions/host/WKOpenVR.CaptionsHost.exe')
            $required.Add('build/driver_wkopenvr/resources/captions/host/openvr_api.dll')
            $required.Add('build/driver_wkopenvr/resources/captions/host/resources/captions-packs.json')
            $required.Add('build/driver_wkopenvr/resources/captions/host/resources/install-captions-pack.ps1')
          }
          if (-not (Test-Path -LiteralPath 'modules/phantom/disabled-in-release.flag')) {
            $required.Add('build/driver_wkopenvr/resources/phantom/host/WKOpenVRPhantomSidecar.exe')
            $required.Add('build/driver_wkopenvr/resources/input/vive_tracker_waist_profile.json')
            $required.Add('build/driver_wkopenvr/resources/input/vive_tracker_left_foot_profile.json')
            $required.Add('build/driver_wkopenvr/resources/input/vive_tracker_right_foot_profile.json')
          }
          $missing = @()
          foreach ($p in $required) {
            if (-not (Test-Path -LiteralPath $p)) { $missing += $p }
          }
          if ($missing.Count -gt 0) {
            Write-Host "Missing artifacts required by installer.nsi:"
            $missing | ForEach-Object { Write-Host "  - $_" }
            throw "NSIS input artifacts are not fully staged. The CMake build did not produce one or more required files."
          }
          Write-Host "All NSIS input artifacts present."

      - name: Install NSIS
        # No-op when the NSIS cache step above restored the install tree.
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe") {
            Write-Host "NSIS already present (cache hit) -- skipping choco install."
            exit 0
          }
          choco install nsis -y --no-progress
          if ($LASTEXITCODE -ne 0) { throw "NSIS install failed (exit $LASTEXITCODE)" }

      - name: Build NSIS installer
        id: installer
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:TAG_NAME -replace '^v', ''
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) { $makensis = "C:\Program Files\NSIS\makensis.exe" }
          if (-not (Test-Path $makensis)) { throw "makensis.exe not found in the standard NSIS install paths." }
          # installer.nsi OutFile is "..\build\artifacts\Release\WKOpenVR-Installer.exe"
          # (relative to the install/ directory), so it writes to build/artifacts/Release/.
          Push-Location install
          & $makensis "/DVERSION=$version" installer.nsi
          $exitCode = $LASTEXITCODE
          Pop-Location
          if ($exitCode -ne 0) { throw "makensis exited $exitCode" }
          $raw = Get-Item "build/artifacts/Release/WKOpenVR-Installer.exe"
          $versioned = "release/WKOpenVR-v$version-Setup.exe"
          Move-Item $raw.FullName $versioned -Force
          $hash = (Get-FileHash $versioned -Algorithm SHA256).Hash
          "path=$((Resolve-Path $versioned).Path)" >> $env:GITHUB_OUTPUT
          "name=$(Split-Path -Leaf $versioned)"    >> $env:GITHUB_OUTPUT
          "sha256=$hash"                           >> $env:GITHUB_OUTPUT
          Write-Host "Installer: $versioned sha256=$hash"

      - name: Build per-feature NSIS installers
        id: feature_installers
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:TAG_NAME -replace '^v', ''
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) { $makensis = "C:\Program Files\NSIS\makensis.exe" }
          if (-not (Test-Path $makensis)) { throw "makensis.exe not found." }
          # Same disabled-in-release filter the zip step uses, so a feature
          # marked unstable doesn't get a per-feature installer either.
          $allFeatures = @(
            [pscustomobject]@{ Name = 'Calibration';  Slug = 'calibration' }
            [pscustomobject]@{ Name = 'Smoothing';    Slug = 'smoothing' }
            [pscustomobject]@{ Name = 'InputHealth';  Slug = 'inputhealth' }
            [pscustomobject]@{ Name = 'FaceTracking'; Slug = 'facetracking' }
            [pscustomobject]@{ Name = 'OSCRouter';    Slug = 'oscrouter' }
            [pscustomobject]@{ Name = 'Captions';     Slug = 'captions' }
            [pscustomobject]@{ Name = 'Phantom';      Slug = 'phantom' }
          )
          $features = $allFeatures | Where-Object {
            $marker = "modules/$($_.Slug)/disabled-in-release.flag"
            if (Test-Path -LiteralPath $marker) {
              Write-Host "Skipping per-feature installer for $($_.Name) ($marker present)"
              return $false
            }
            return $true
          } | ForEach-Object { $_.Name }
          $outputs = @{}
          foreach ($feat in $features) {
            Push-Location install
            & $makensis "/DVERSION=$version" "/DFEATURE=$feat" installer.nsi
            $exitCode = $LASTEXITCODE
            Pop-Location
            if ($exitCode -ne 0) { throw "makensis ($feat) exited $exitCode" }
            $raw = "build/artifacts/Release/WKOpenVR-$feat-Setup.exe"
            if (-not (Test-Path $raw)) { throw "expected $raw missing after makensis" }
            New-Item -ItemType Directory -Force -Path "release" | Out-Null
            $versioned = "release/WKOpenVR-$feat-v$version-Setup.exe"
            Move-Item $raw $versioned -Force
            $hash = (Get-FileHash $versioned -Algorithm SHA256).Hash
            $outputs[$feat] = (Resolve-Path $versioned).Path
            Write-Host "Per-feature installer ($feat): $versioned sha256=$hash"
          }
          "installer_calibration=$($outputs['Calibration'])"   >> $env:GITHUB_OUTPUT
          "installer_smoothing=$($outputs['Smoothing'])"       >> $env:GITHUB_OUTPUT
          "installer_inputhealth=$($outputs['InputHealth'])"   >> $env:GITHUB_OUTPUT
          "installer_facetracking=$($outputs['FaceTracking'])" >> $env:GITHUB_OUTPUT
          "installer_oscrouter=$($outputs['OSCRouter'])"       >> $env:GITHUB_OUTPUT
          "installer_captions=$($outputs['Captions'])"         >> $env:GITHUB_OUTPUT
          "installer_phantom=$($outputs['Phantom'])"           >> $env:GITHUB_OUTPUT

      - name: Generate release body
        id: changelog
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $body = & ./.github/scripts/Generate-ReleaseNotes.ps1 `
            -ZipPath   '${{ steps.zips.outputs.umbrella_path }}' `
            -ZipName   '${{ steps.zips.outputs.umbrella_name }}' `
            -ZipSize   '${{ steps.zips.outputs.umbrella_size }}' `
            -ZipSha256 '${{ steps.zips.outputs.umbrella_sha256 }}' `
            -Manifest  '${{ steps.zips.outputs.umbrella_manifest }}'
          if (-not $body) {
            throw "Generate-ReleaseNotes.ps1 returned empty output."
          }
          $delim = "EOF_" + [Guid]::NewGuid().ToString('N')
          "body<<$delim" >> $env:GITHUB_OUTPUT
          $body          >> $env:GITHUB_OUTPUT
          $delim         >> $env:GITHUB_OUTPUT

      - name: Create GitHub release (umbrella)
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag       = "${{ github.ref_name }}"
          $zip       = "${{ steps.zips.outputs.umbrella_path }}"
          $installer = "${{ steps.installer.outputs.path }}"
          $notes     = @'
          ${{ steps.changelog.outputs.body }}
          '@
          $notesPath = Join-Path $env:RUNNER_TEMP 'release-body-input.md'
          $notes | Out-File -LiteralPath $notesPath -Encoding utf8 -NoNewline
          "input_path=$notesPath" >> $env:GITHUB_OUTPUT
          gh release create $tag $zip $installer --title $tag --notes-file $notesPath

      - name: Verify published release body matches input
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag       = "${{ github.ref_name }}"
          $inputPath = "${{ steps.publish.outputs.input_path }}"
          $expected  = (Get-Content -LiteralPath $inputPath -Raw -Encoding UTF8) -replace "`r`n","`n"
          $expected  = $expected.TrimEnd("`n")

          function Get-StringSha256 {
            param([string]$Text)
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($Text)
            $sha   = [System.Security.Cryptography.SHA256]::Create()
            try { return [BitConverter]::ToString($sha.ComputeHash($bytes)).Replace('-', '') }
            finally { $sha.Dispose() }
          }

          function Test-PublishedBodyMatches {
            param([string]$Tag, [string]$Expected, [int]$MaxAttempts = 6)
            $expectedSha = Get-StringSha256 -Text $Expected
            $delay = 2
            $lastActual = ''
            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              $raw = & gh release view $Tag --json body --jq '.body'
              if ($LASTEXITCODE -ne 0) { throw "gh release view $Tag failed: $raw" }
              $actual    = ($raw -replace "`r`n","`n").TrimEnd("`n")
              $lastActual = $actual
              $actualSha = Get-StringSha256 -Text $actual
              if ($actualSha -eq $expectedSha) {
                Write-Host "Attempt $attempt/${MaxAttempts}: body matches (len=$($actual.Length) sha256=$($actualSha.Substring(0,12)))."
                return @{ Match = $true; Actual = $actual; AttemptCount = $attempt }
              }
              Write-Host "Attempt $attempt/${MaxAttempts}: actual_len=$($actual.Length) expected_len=$($Expected.Length) actual_sha=$($actualSha.Substring(0,12)) expected_sha=$($expectedSha.Substring(0,12))"
              if ($attempt -lt $MaxAttempts) {
                Write-Host "Sleeping ${delay}s before retry..."
                Start-Sleep -Seconds $delay
                $delay = $delay * 2
              }
            }
            return @{ Match = $false; Actual = $lastActual; AttemptCount = $MaxAttempts }
          }

          $result = Test-PublishedBodyMatches -Tag $tag -Expected $expected
          if ($result.Match) {
            Write-Host "Published release body matches input on attempt $($result.AttemptCount) ($($expected.Length) chars)."
            return
          }

          Write-Host "::warning::Body still differs after $($result.AttemptCount) attempts. Auto-correcting via gh release edit."
          gh release edit $tag --notes-file $inputPath
          if ($LASTEXITCODE -ne 0) { throw "gh release edit failed during auto-correct" }

          $recheck = Test-PublishedBodyMatches -Tag $tag -Expected $expected
          if ($recheck.Match) {
            Write-Host "Auto-correct succeeded on attempt $($recheck.AttemptCount)."
            return
          }

          # The `gh release edit --notes-file` call above already returned
          # exit 0, which means GitHub accepted the corrected body. Any
          # remaining mismatch from a follow-up `gh release view` is the
          # API's eventual-consistency lag, not a real publish failure.
          # See release_verify_indexing_lag_2026-05-07 -- the same
          # behaviour bit the SC pipeline. Surface a warning instead of
          # failing the workflow so the umbrella release stays
          # published and the downstream mirror steps still run.
          Write-Host "::warning::Release body verify could not confirm the auto-corrected body within $($recheck.AttemptCount) attempts. The edit request succeeded; treating as a transient API lag and continuing."

      # Mirror releases: one per feature. Each push uses MIRROR_RELEASE_TOKEN
      # (a fine-grained PAT with contents:write on the three sibling repos).
      # The notes reference back to this repo's release so users clicking
      # through from a sibling repo's releases tab find the full changelog.
      - name: Mirror release to WKOpenVR-SpaceCalibrator
        env:
          GH_TOKEN: ${{ secrets.MIRROR_RELEASE_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        shell: pwsh
        run: |
          $tag       = "${{ github.ref_name }}"
          $zip       = "${{ steps.zips.outputs.mirror_calibration }}"
          $installer = "${{ steps.feature_installers.outputs.installer_calibration }}"
          $repo  = "RealWhyKnot/WKOpenVR-SpaceCalibrator"
          $notes = "Mirror of WKOpenVR release $tag. Zip includes enable_calibration.flag so calibration activates immediately. Source: https://github.com/RealWhyKnot/WKOpenVR/commit/$env:GITHUB_SHA"
          gh release create $tag $zip $installer --repo $repo --title $tag --notes $notes

      - name: Mirror release to WKOpenVR-Smoothing
        env:
          GH_TOKEN: ${{ secrets.MIRROR_RELEASE_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        shell: pwsh
        run: |
          $tag       = "${{ github.ref_name }}"
          $zip       = "${{ steps.zips.outputs.mirror_smoothing }}"
          $installer = "${{ steps.feature_installers.outputs.installer_smoothing }}"
          $repo  = "RealWhyKnot/WKOpenVR-Smoothing"
          $notes = "Mirror of WKOpenVR release $tag. Zip includes enable_smoothing.flag so smoothing activates immediately. Source: https://github.com/RealWhyKnot/WKOpenVR/commit/$env:GITHUB_SHA"
          gh release create $tag $zip $installer --repo $repo --title $tag --notes $notes

      - name: Mirror release to WKOpenVR-InputHealth
        env:
          GH_TOKEN: ${{ secrets.MIRROR_RELEASE_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        shell: pwsh
        run: |
          $tag       = "${{ github.ref_name }}"
          $zip       = "${{ steps.zips.outputs.mirror_inputhealth }}"
          $installer = "${{ steps.feature_installers.outputs.installer_inputhealth }}"
          $repo  = "RealWhyKnot/WKOpenVR-InputHealth"
          $notes = "Mirror of WKOpenVR release $tag. Zip includes enable_inputhealth.flag so input health monitoring activates immediately. Source: https://github.com/RealWhyKnot/WKOpenVR/commit/$env:GITHUB_SHA"
          gh release create $tag $zip $installer --repo $repo --title $tag --notes $notes

      - name: Mirror release to WKOpenVR-VRCFT
        if: ${{ steps.zips.outputs.mirror_facetracking != '' }}
        env:
          GH_TOKEN: ${{ secrets.MIRROR_RELEASE_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        shell: pwsh
        run: |
          $tag       = "${{ github.ref_name }}"
          $zip       = "${{ steps.zips.outputs.mirror_facetracking }}"
          $installer = "${{ steps.feature_installers.outputs.installer_facetracking }}"
          $repo  = "RealWhyKnot/WKOpenVR-VRCFT"
          $notes = "Mirror of WKOpenVR release $tag. Zip includes enable_facetracking.flag so face and eye tracking activate immediately. Source: https://github.com/RealWhyKnot/WKOpenVR/commit/$env:GITHUB_SHA"
          gh release create $tag $zip $installer --repo $repo --title $tag --notes $notes

      - name: Mirror release to WKOpenVR-OSCRouter
        if: ${{ steps.zips.outputs.mirror_oscrouter != '' }}
        env:
          GH_TOKEN: ${{ secrets.MIRROR_RELEASE_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        shell: pwsh
        run: |
          $tag       = "${{ github.ref_name }}"
          $zip       = "${{ steps.zips.outputs.mirror_oscrouter }}"
          $installer = "${{ steps.feature_installers.outputs.installer_oscrouter }}"
          $repo  = "RealWhyKnot/WKOpenVR-OSCRouter"
          $notes = "Mirror of WKOpenVR release $tag. Zip includes enable_oscrouter.flag so OSC fan-out activates immediately. Source: https://github.com/RealWhyKnot/WKOpenVR/commit/$env:GITHUB_SHA"
          gh release create $tag $zip $installer --repo $repo --title $tag --notes $notes

      - name: Mirror release to WKOpenVR-Captions
        if: ${{ steps.zips.outputs.mirror_captions != '' }}
        env:
          GH_TOKEN: ${{ secrets.MIRROR_RELEASE_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        shell: pwsh
        run: |
          $tag       = "${{ github.ref_name }}"
          $zip       = "${{ steps.zips.outputs.mirror_captions }}"
          $installer = "${{ steps.feature_installers.outputs.installer_captions }}"
          $repo  = "RealWhyKnot/WKOpenVR-Captions"
          $notes = "Mirror of WKOpenVR release $tag. Zip includes enable_captions.flag so live captions activate immediately. Source: https://github.com/RealWhyKnot/WKOpenVR/commit/$env:GITHUB_SHA"
          gh release create $tag $zip $installer --repo $repo --title $tag --notes $notes

      - name: Mirror release to WKOpenVR-Phantom
        if: ${{ steps.zips.outputs.mirror_phantom != '' }}
        env:
          GH_TOKEN: ${{ secrets.MIRROR_RELEASE_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        shell: pwsh
        run: |
          $tag       = "${{ github.ref_name }}"
          $zip       = "${{ steps.zips.outputs.mirror_phantom }}"
          $installer = "${{ steps.feature_installers.outputs.installer_phantom }}"
          $repo  = "RealWhyKnot/WKOpenVR-Phantom"
          $notes = "Mirror of WKOpenVR release $tag. Zip includes enable_phantom.flag so phantom-tracker dropout bridging activates immediately. Source: https://github.com/RealWhyKnot/WKOpenVR/commit/$env:GITHUB_SHA"
          gh release create $tag $zip $installer --repo $repo --title $tag --notes $notes

      - name: Push promoted changelog back to main (verified)
        # Use the GraphQL createCommitOnBranch mutation so the promotion
        # commit is signed server-side with GitHub's bot key. Done last so a
        # build or release failure does not push a phantom-promoted CHANGELOG.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git fetch origin main
          if cmp -s .changelog-stash/CHANGELOG.md <(git show origin/main:CHANGELOG.md) \
             && cmp -s .changelog-stash/wiki/Changelog.md <(git show origin/main:wiki/Changelog.md); then
            echo "Nothing to promote -- main already carries the promoted bytes."
            exit 0
          fi

          changelog_b64=$(base64 -w 0 .changelog-stash/CHANGELOG.md)
          wiki_b64=$(base64 -w 0 .changelog-stash/wiki/Changelog.md)
          expected_oid=$(git rev-parse origin/main)

          headline="docs(changelog): promote Unreleased -> ${TAG_NAME} [skip changelog]"
          body="Promoted by .github/workflows/release.yml after publishing ${TAG_NAME}."

          payload=$(jq -n \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "main" \
            --arg headline "$headline" \
            --arg body "$body" \
            --arg oid "$expected_oid" \
            --arg changelog "$changelog_b64" \
            --arg wiki "$wiki_b64" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid url } } }",
              variables: {
                input: {
                  branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                  message: { headline: $headline, body: $body },
                  fileChanges: {
                    additions: [
                      { path: "CHANGELOG.md",      contents: $changelog },
                      { path: "wiki/Changelog.md", contents: $wiki }
                    ]
                  },
                  expectedHeadOid: $oid
                }
              }
            }')

          response=$(printf '%s' "$payload" | gh api graphql --input -)
          echo "$response" | jq .

          if echo "$response" | jq -e '.errors // empty' >/dev/null; then
            echo "::error::createCommitOnBranch returned GraphQL errors"
            exit 1
          fi

          new_oid=$(echo "$response" | jq -r '.data.createCommitOnBranch.commit.oid')
          if [[ -z "$new_oid" || "$new_oid" == "null" ]]; then
            echo "::error::createCommitOnBranch did not return a commit oid"
            exit 1
          fi

          verified=$(gh api "repos/$GITHUB_REPOSITORY/commits/$new_oid" --jq '.commit.verification.verified')
          if [[ "$verified" != "true" ]]; then
            echo "::error::Commit $new_oid is not verified (got: $verified)"
            gh api "repos/$GITHUB_REPOSITORY/commits/$new_oid" --jq '.commit.verification'
            exit 1
          fi
          echo "Verified promote commit: $new_oid"

      - name: Clean up partial release on failure
        # When any step after "Create GitHub release" fails, the umbrella
        # release is up and some mirror releases may already be up on
        # the sibling repos -- those would be orphans pointing at a
        # commit that the next retry may rewrite. Delete the umbrella
        # AND every mirror release for $TAG_NAME so the retry starts
        # from a fully clean slate. The umbrella uses GITHUB_TOKEN;
        # the mirrors use MIRROR_RELEASE_TOKEN (same PAT the mirror
        # publish steps use). Per-mirror delete failures are warnings,
        # not fatal -- one common cause is the mirror was never
        # created (step skipped) and there is nothing to delete.
        if: failure()
        env:
          GH_TOKEN_UMBRELLA: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN_MIRROR: ${{ secrets.MIRROR_RELEASE_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $tag = $env:TAG_NAME

          function Remove-ReleaseIfPresent {
              param([string]$Repo, [string]$Token, [string]$Label)
              $env:GH_TOKEN = $Token
              $exists = gh release view $tag --repo $Repo --json id 2>$null
              if ($LASTEXITCODE -eq 0 -and $exists) {
                  Write-Host "Cleanup: deleting $Label release $tag from $Repo."
                  gh release delete $tag --repo $Repo --yes --cleanup-tag
                  if ($LASTEXITCODE -ne 0) {
                      Write-Host "::warning::Could not auto-delete $Label release $tag on $Repo. Manual cleanup may be needed before retrying."
                  }
              } else {
                  Write-Host "Cleanup: no $Label release $tag on $Repo -- nothing to remove."
              }
          }

          $umbrellaRepo = "${{ github.repository }}"
          Remove-ReleaseIfPresent -Repo $umbrellaRepo -Token $env:GH_TOKEN_UMBRELLA -Label "umbrella"

          $mirrors = @(
              'RealWhyKnot/WKOpenVR-SpaceCalibrator',
              'RealWhyKnot/WKOpenVR-Smoothing',
              'RealWhyKnot/WKOpenVR-InputHealth',
              'RealWhyKnot/WKOpenVR-VRCFT',
              'RealWhyKnot/WKOpenVR-OSCRouter',
              'RealWhyKnot/WKOpenVR-Captions',
              'RealWhyKnot/WKOpenVR-Phantom'
          )
          foreach ($repo in $mirrors) {
              Remove-ReleaseIfPresent -Repo $repo -Token $env:GH_TOKEN_MIRROR -Label "mirror"
          }
