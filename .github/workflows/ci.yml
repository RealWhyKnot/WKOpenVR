name: CI

# Triggered on PRs against main, direct pushes to main, and manual dispatch.
# The push-to-main trigger catches commits that land outside of a tag release
# (doc updates, hotfixes, etc.) and gives early signal before the next tag.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.gitattributes'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.gitattributes'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-lint-${{ runner.os }}-${{ hashFiles('modules/facetracking/src/host/**/*.csproj', 'tests/e2e/facetracking_test_module/**/*.csproj', 'modules/facetracking/src/host/**/packages.lock.json') }}
          restore-keys: |
            nuget-lint-${{ runner.os }}-

      - name: Install LLVM tools
        shell: pwsh
        run: |
          function Test-RunClangTidyAvailable {
            $command = Get-Command run-clang-tidy -ErrorAction SilentlyContinue
            if ($command) { return $true }

            $clangTidy = Get-Command clang-tidy -ErrorAction SilentlyContinue
            if (-not $clangTidy) { return $false }

            $clangTidyDir = Split-Path -Parent $clangTidy.Source
            $candidates = @(
              (Join-Path $clangTidyDir 'run-clang-tidy'),
              (Join-Path $clangTidyDir 'run-clang-tidy.py')
            )
            foreach ($candidate in $candidates) {
              if (Test-Path -LiteralPath $candidate) { return $true }
            }
            return $false
          }

          $llvmTools = @('clang-format', 'clang-tidy', 'clang-apply-replacements')
          $missingLlvm = @()
          foreach ($tool in $llvmTools) {
            if (-not (Get-Command $tool -ErrorAction SilentlyContinue)) {
              $missingLlvm += $tool
            }
          }

          $missingLabels = @($missingLlvm)
          $needsLlvm = ($missingLabels.Count -gt 0)
          if (-not (Test-RunClangTidyAvailable)) {
            $needsLlvm = $true
            $missingLabels += 'run-clang-tidy'
          }

          if ($needsLlvm) {
            Write-Host "Installing LLVM tools: $($missingLabels -join ', ')"
            choco install llvm -y --no-progress
            if ($LASTEXITCODE -ne 0) { throw "LLVM install failed (exit $LASTEXITCODE)" }
            $llvmBin = 'C:\Program Files\LLVM\bin'
            if (Test-Path -LiteralPath $llvmBin) {
              $llvmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              $env:PATH = "$llvmBin;$env:PATH"
            }
          } else {
            Write-Host "LLVM tools already available."
          }

          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
            if ($LASTEXITCODE -ne 0) { throw "Ninja install failed (exit $LASTEXITCODE)" }
          } else {
            Write-Host "Ninja already available."
          }

      - name: Run lint check
        shell: pwsh
        run: .\lint.ps1 -Check

  build:
    name: cmake + msbuild (windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Validate workflow / script PowerShell syntax
        # Catches the class of latent PowerShell parser bug that took
        # down recent release attempts. Runs first so a syntax mistake
        # fails the PR / push in seconds instead of after a 5-minute
        # build.
        shell: pwsh
        run: |
          ./.github/scripts/Test-WorkflowSyntax.ps1
          ./.github/scripts/Test-UpdateChangelog.ps1
          ./.github/scripts/Test-GenerateReleaseNotes.ps1

      - name: Set up .NET 10 SDK
        # Pinned by modules/facetracking/src/host/global.json. Without an
        # explicit setup the runner default may not include 10.x and the
        # CMake host target silently skips itself, masking the gap until
        # release time.
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache build directory
        # CMake handles incremental builds natively; restoring build/
        # cuts ~5 min off the cold MSVC pass when a PR touches only a
        # few files. Falls back to the most recent build on a hash miss.
        uses: actions/cache@v5
        with:
          path: build
          key: build-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'core/src/**/*.cpp', 'core/src/**/*.h', 'modules/**/*.cpp', 'modules/**/*.h', 'modules/**/*.cs', '.gitmodules', 'version.txt') }}
          restore-keys: |
            build-${{ runner.os }}-

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('modules/facetracking/src/host/**/*.csproj', 'modules/facetracking/src/host/**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache NSIS install
        uses: actions/cache@v5
        with:
          path: 'C:\Program Files (x86)\NSIS'
          key: nsis-${{ runner.os }}-3.12

      - name: Configure
        # The minhook submodule declares cmake_minimum_required(2.8.12) which
        # CMake 4.x rejects. -DCMAKE_POLICY_VERSION_MINIMUM=3.5 lets us configure
        # without forking. -Wno-dev silences developer-mode warnings from minhook.
        run: cmake -G "Visual Studio 17 2022" -A x64 -B build -S . '-DCMAKE_POLICY_VERSION_MINIMUM=3.5' -DWKOPENVR_CAPTIONS_CUDA=OFF -Wno-dev

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        shell: pwsh
        run: |
          $tests = Get-ChildItem build/artifacts/Release/*_tests.exe
          if ($tests.Count -eq 0) { throw "No test binaries found" }
          foreach ($t in $tests) {
            Write-Host "Running $($t.Name)..."
            & $t.FullName --gtest_brief=1
            if ($LASTEXITCODE -ne 0) { throw "$($t.Name) failed (exit $LASTEXITCODE)" }
          }

      - name: Run captions host self-test
        shell: pwsh
        run: |
          $hostExe = 'build/driver_wkopenvr/resources/captions/host/WKOpenVR.CaptionsHost.exe'
          if (-not (Test-Path -LiteralPath $hostExe)) {
            throw "Captions host missing at $hostExe"
          }
          # The captions host links as SUBSYSTEM:WINDOWS to avoid a console flash
          # on driver-side spawn. PowerShell's `& exe` does not wait for
          # SUBSYSTEM:WINDOWS processes -- it starts them detached and leaves
          # $LASTEXITCODE unset. Start-Process -Wait blocks until exit and
          # exposes the real exit code on the returned process object.
          $p = Start-Process -FilePath $hostExe -ArgumentList '--self-test' `
              -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "Captions host self-test failed (exit $($p.ExitCode))" }

      - name: Install NSIS
        # No-op when the NSIS cache step above restored the install tree.
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe") {
            Write-Host "NSIS already present (cache hit) -- skipping choco install."
            exit 0
          }
          choco install nsis -y --no-progress
          if ($LASTEXITCODE -ne 0) { throw "NSIS install failed (exit $LASTEXITCODE)" }

      - name: Verify NSIS input artifacts staged
        # Same precondition check release.yml uses, run in CI so a staging
        # gap fails the PR / push instead of surfacing only at tag time.
        shell: pwsh
        run: |
          $required = @(
            'build/artifacts/Release/WKOpenVR.exe',
            'build/artifacts/Release/openvr_api.dll',
            'build/artifacts/Release/manifest.vrmanifest',
            'build/artifacts/Release/dashboard_icon.png',
            'build/artifacts/Release/boundary_icon.png',
            'build/artifacts/Release/resources/face-module-sync.ps1',
            'build/artifacts/Release/resources/questapp/install-platform-tools.ps1',
            'build/artifacts/Release/resources/questapp/uninstall-questapp.ps1',
            'build/artifacts/Release/resources/questapp/WKOpenVRQuestCompanion.apk',
            'build/driver_wkopenvr/driver.vrdrivermanifest',
            'build/driver_wkopenvr/resources/driver.vrresources',
            'build/driver_wkopenvr/resources/settings/default.vrsettings',
            'build/driver_wkopenvr/bin/win64/driver_wkopenvr.dll',
            'build/driver_wkopenvr/resources/facetracking/host/WKOpenVR.FaceModuleHost.exe',
            'build/driver_wkopenvr/resources/captions/host/WKOpenVR.CaptionsHost.exe',
            'build/driver_wkopenvr/resources/captions/host/openvr_api.dll',
            'build/driver_wkopenvr/resources/captions/host/resources/captions-packs.json',
            'build/driver_wkopenvr/resources/captions/host/resources/install-captions-pack.ps1',
            'build/driver_wkopenvr/resources/phantom/host/WKOpenVRPhantomSidecar.exe'
          )
          $missing = @()
          foreach ($p in $required) {
            if (-not (Test-Path -LiteralPath $p)) { $missing += $p }
          }
          if ($missing.Count -gt 0) {
            Write-Host "Missing artifacts required by installer.nsi:"
            $missing | ForEach-Object { Write-Host "  - $_" }
            throw "NSIS input artifacts are not fully staged."
          }
          Write-Host "All NSIS input artifacts present."

      - name: Validate NSIS installer script
        shell: pwsh
        run: |
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) { $makensis = "C:\Program Files\NSIS\makensis.exe" }
          if (-not (Test-Path $makensis)) { throw "makensis.exe not found." }
          # Dry-run umbrella build.
          Push-Location install
          & $makensis /V2 installer.nsi
          $exitUmbrella = $LASTEXITCODE
          # Dry-run one per-feature build to exercise the FEATURE= code path.
          & $makensis /V2 /DFEATURE=Calibration installer.nsi
          $exitFeature = $LASTEXITCODE
          Pop-Location
          if ($exitUmbrella -ne 0) { throw "makensis (umbrella) exited $exitUmbrella" }
          if ($exitFeature  -ne 0) { throw "makensis (Calibration) exited $exitFeature" }

      - name: Test installer uninstall/reinstall
        shell: pwsh
        run: |
          ./.github/scripts/Test-InstallerRoundTrip.ps1 `
            -InstallerPath 'build/artifacts/Release/WKOpenVR-Installer.exe' `
            -AllowUserDataRemoval

      - name: Stage artifacts
        shell: pwsh
        run: |
          $stage = "stage"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          foreach ($name in @("WKOpenVR.exe", "driver_wkopenvr.dll")) {
              $src = "build/artifacts/Release/$name"
              if (Test-Path $src) {
                  Copy-Item -Path $src -Destination $stage
              } else {
                  Write-Host "::warning::$name not found at $src. Skipping."
              }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pairdriver-${{ github.sha }}
          path: stage
          if-no-files-found: ignore
          retention-days: 14
