name: CI

# Triggered on PRs against main, direct pushes to main, and manual dispatch.
# Per-push CI is deliberately fast: a format-only lint (clang-format + dotnet
# format) plus the C++ build + unit tests. The slow passes live elsewhere:
#   - full clang-tidy        -> .github/workflows/nightly-tidy.yml (scheduled)
#   - installer validation   -> .github/workflows/release.yml (on tag)
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.gitattributes'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.gitattributes'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint (format)
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-lint-${{ runner.os }}-${{ hashFiles('modules/facetracking/src/host/**/*.csproj', 'tests/e2e/facetracking_test_module/**/*.csproj', 'modules/facetracking/src/host/**/packages.lock.json') }}
          restore-keys: |
            nuget-lint-${{ runner.os }}-

      - name: Cache LLVM
        uses: actions/cache@v5
        with:
          path: 'C:\Program Files\LLVM'
          key: llvm-${{ runner.os }}-22.1.0-v2

      - name: Install clang-format
        # Per-push lint runs format only; the heavy clang-tidy pass moved to the
        # nightly-tidy workflow. The runner image ships its own LLVM, so we must
        # pin the EXACT clang-format version CI standardizes on (22.1.0) -- a
        # different version reformats some constructs differently and would flag
        # files that are actually clean. Install (force) unless 22.1.0 is already
        # present from the cache.
        shell: pwsh
        run: |
          $want = '22.1.0'
          $llvmBin = 'C:\Program Files\LLVM\bin'
          $cf = Join-Path $llvmBin 'clang-format.exe'
          $have = ''
          if (Test-Path $cf) {
            if (((& $cf --version) -join ' ') -match '(\d+\.\d+\.\d+)') { $have = $Matches[1] }
          }
          if ($have -eq $want) {
            Write-Host "clang-format $want already present -- skipping install."
          } else {
            Write-Host "Installing LLVM $want (found '$have')."
            choco install llvm --version $want -y --no-progress --force
            if ($LASTEXITCODE -ne 0) { throw "LLVM install failed (exit $LASTEXITCODE)" }
          }
          if (-not (Test-Path $cf)) { throw "clang-format.exe not found at $llvmBin after install." }
          $llvmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $actual = ((& $cf --version) -join ' ')
          if ($actual -notmatch [regex]::Escape($want)) { throw "clang-format version mismatch: '$actual' (wanted $want)" }
          Write-Host "Using $actual"

      - name: Run format check
        shell: pwsh
        run: .\lint.ps1 -FormatOnly -Check

  build:
    name: cmake + msbuild (windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Validate workflow / script PowerShell syntax
        # Catches the class of latent PowerShell parser bug that took down recent
        # release attempts. Runs first so a syntax mistake fails in seconds.
        shell: pwsh
        run: |
          ./.github/scripts/Test-WorkflowSyntax.ps1
          ./.github/scripts/Test-UpdateChangelog.ps1
          ./.github/scripts/Test-GenerateReleaseNotes.ps1

      - name: Set up .NET 10 SDK
        # Pinned by modules/facetracking/src/host/global.json. Without an explicit
        # setup the runner default may not include 10.x and the CMake host target
        # silently skips itself, masking the gap until release time.
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache build directory
        # CMake handles incremental builds natively; restoring build/ cuts the
        # cold MSVC pass when a change touches only a few files. Falls back to
        # the most recent build on a hash miss.
        uses: actions/cache@v5
        with:
          path: build
          key: build-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'core/src/**/*.cpp', 'core/src/**/*.h', 'modules/**/*.cpp', 'modules/**/*.h', 'modules/**/*.cs', '.gitmodules', 'version.txt') }}
          restore-keys: |
            build-${{ runner.os }}-

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('modules/facetracking/src/host/**/*.csproj', 'modules/facetracking/src/host/**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Configure
        # The minhook submodule declares cmake_minimum_required(2.8.12) which
        # CMake 4.x rejects. -DCMAKE_POLICY_VERSION_MINIMUM=3.5 lets us configure
        # without forking. -Wno-dev silences developer-mode warnings from minhook.
        run: cmake -G "Visual Studio 17 2022" -A x64 -B build -S . '-DCMAKE_POLICY_VERSION_MINIMUM=3.5' -DWKOPENVR_CAPTIONS_CUDA=OFF -Wno-dev

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        shell: pwsh
        run: |
          $tests = Get-ChildItem build/artifacts/Release/*_tests.exe
          if ($tests.Count -eq 0) { throw "No test binaries found" }
          foreach ($t in $tests) {
            Write-Host "Running $($t.Name)..."
            & $t.FullName --gtest_brief=1
            if ($LASTEXITCODE -ne 0) { throw "$($t.Name) failed (exit $LASTEXITCODE)" }
          }

      - name: Run captions host self-test
        # Release builds gate captions off (disabled-in-release.flag), so this dev
        # build is the only place the captions host smoke-tests. The host links as
        # SUBSYSTEM:WINDOWS, so `& exe` would start it detached without waiting;
        # Start-Process -Wait blocks and exposes the real exit code.
        shell: pwsh
        run: |
          $hostExe = 'build/driver_wkopenvr/resources/captions/host/WKOpenVR.CaptionsHost.exe'
          if (-not (Test-Path -LiteralPath $hostExe)) {
            throw "Captions host missing at $hostExe"
          }
          $p = Start-Process -FilePath $hostExe -ArgumentList '--self-test' `
              -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "Captions host self-test failed (exit $($p.ExitCode))" }

      - name: Stage artifacts
        shell: pwsh
        run: |
          $stage = "stage"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          foreach ($name in @("WKOpenVR.exe", "driver_wkopenvr.dll")) {
              $src = "build/artifacts/Release/$name"
              if (Test-Path $src) {
                  Copy-Item -Path $src -Destination $stage
              } else {
                  Write-Host "::warning::$name not found at $src. Skipping."
              }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pairdriver-${{ github.sha }}
          path: stage
          if-no-files-found: ignore
          retention-days: 14
