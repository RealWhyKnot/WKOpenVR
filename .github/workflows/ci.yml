name: CI

# Triggered on PRs against main, direct pushes to main, and manual dispatch.
# Per-push CI is deliberately focused: formatting plus clang-tidy on changed
# C/C++ source files, then the C++ build + tests. The dev leg runs the full
# test pipeline through test.ps1 (gtest binaries, sidecar self-tests, and the
# in-process driver harness); the release leg runs the gtest binaries inline
# because release gates the sidecars off. Slow or network-bound passes live
# elsewhere:
#   - full clang-tidy        -> .github/workflows/nightly-tidy.yml (scheduled)
#   - download + load tests  -> .github/workflows/nightly-tests.yml (scheduled)
#   - installer validation   -> .github/workflows/release.yml (on tag)
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.gitattributes'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.gitattributes'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint (changed)
    runs-on: windows-2025-vs2026
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: false

      - name: Checkout submodules (with retry)
        uses: ./.github/actions/checkout-submodules

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-lint-${{ runner.os }}-${{ hashFiles('modules/facetracking/src/host/**/*.csproj', 'tests/e2e/facetracking_test_module/**/*.csproj', 'modules/facetracking/src/host/**/packages.lock.json') }}
          restore-keys: |
            nuget-lint-${{ runner.os }}-

      - name: Cache LLVM
        uses: actions/cache@v6
        with:
          path: 'C:\Program Files\LLVM'
          key: llvm-${{ runner.os }}-22.1.0-v2

      - name: Install LLVM tools
        # The runner image ships its own LLVM, so pin the exact version CI uses
        # (22.1.0) rather than skipping on mere presence -- clang-format/tidy
        # behavior differs across versions. Force-install unless 22.1.0 is cached.
        shell: pwsh
        run: |
          $want = '22.1.0'
          $llvmBin = 'C:\Program Files\LLVM\bin'
          $ct = Join-Path $llvmBin 'clang-tidy.exe'
          $have = ''
          if (Test-Path $ct) {
            if (((& $ct --version) -join ' ') -match '(\d+\.\d+\.\d+)') { $have = $Matches[1] }
          }
          if ($have -eq $want) {
            Write-Host "LLVM $want already present -- skipping install."
          } else {
            Write-Host "Installing LLVM $want (found '$have')."
            choco install llvm --version $want -y --no-progress --force
            if ($LASTEXITCODE -ne 0) { throw "LLVM install failed (exit $LASTEXITCODE)" }
          }
          if (-not (Test-Path -LiteralPath $llvmBin)) { throw "LLVM bin missing at $llvmBin" }
          $llvmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$llvmBin;$env:PATH"
          foreach ($tool in @('clang-format', 'clang-tidy', 'clang-apply-replacements')) {
            if (-not (Get-Command $tool -ErrorAction SilentlyContinue)) {
              throw "$tool was not found after installing LLVM."
            }
          }
          $actual = ((& $ct --version) -join ' ')
          if ($actual -notmatch [regex]::Escape($want)) { throw "clang-tidy version mismatch: '$actual' (wanted $want)" }
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
            if ($LASTEXITCODE -ne 0) { throw "Ninja install failed (exit $LASTEXITCODE)" }
          }
          Write-Host "Using $actual"

      - name: Run changed lint check
        shell: pwsh
        run: |
          $base = '${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}'
          if ([string]::IsNullOrWhiteSpace($base) -or $base -match '^0+$') {
            $base = 'origin/main'
          }
          Write-Host "Changed base: $base"
          .\lint.ps1 -Check -ChangedOnly -ChangedBase $base

  build:
    name: cmake + msbuild (windows, ${{ matrix.channel }})
    runs-on: windows-2025-vs2026
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # The release leg compiles with WKOPENVR_BUILD_IS_DEV=0 so channel-gated
        # code paths (and their tests) break here instead of on the next tag's
        # Release run.
        channel: [dev, release]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Checkout submodules (with retry)
        uses: ./.github/actions/checkout-submodules

      - name: Stamp release build channel
        if: matrix.channel == 'release'
        # Mirrors release.yml's channel stamp; must exist before Configure so
        # CMake keeps it instead of writing the dev default.
        shell: pwsh
        run: |
          Set-Content -Path core/src/common/BuildChannel.h -Value @"
          // Overwritten by release.yml with the shared binary's per-build stamp.
          #pragma once

          #define WKOPENVR_BUILD_STAMP "0.0.0.0-CI"
          #define WKOPENVR_BUILD_CHANNEL "release"
          #define WKOPENVR_BUILD_IS_DEV 0
          "@

      - name: Validate workflow / script PowerShell syntax
        # Catches the class of latent PowerShell parser bug that took down recent
        # release attempts. Runs first so a syntax mistake fails in seconds.
        shell: pwsh
        run: |
          ./.github/scripts/Test-WorkflowSyntax.ps1
          ./.github/scripts/Test-UpdateChangelog.ps1
          ./.github/scripts/Test-NightlyBetaPlan.ps1
          ./.github/scripts/Test-GenerateReleaseNotes.ps1

      - name: Set up .NET 10 SDK
        # Pinned by modules/facetracking/src/host/global.json. Without an explicit
        # setup the runner default may not include 10.x and the CMake host target
        # silently skips itself, masking the gap until release time.
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore build directory cache
        id: build-cache
        # CMake handles incremental builds natively; restoring build/ cuts the
        # cold MSVC pass when a change touches only a few files. Keep save as a
        # separate best-effort step so cache archive failures cannot fail CI
        # after build/tests already passed.
        uses: actions/cache/restore@v6
        with:
          path: build
          key: build-vs2026-${{ runner.os }}-${{ matrix.channel }}-${{ hashFiles('**/CMakeLists.txt', 'core/src/**/*.cpp', 'core/src/**/*.h', 'modules/**/*.cpp', 'modules/**/*.h', 'modules/**/*.cs', '.gitmodules', 'version.txt') }}
          restore-keys: |
            build-vs2026-${{ runner.os }}-${{ matrix.channel }}-

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('modules/facetracking/src/host/**/*.csproj', 'modules/facetracking/src/host/**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Configure
        # The minhook submodule declares cmake_minimum_required(2.8.12) which
        # CMake 4.x rejects. -DCMAKE_POLICY_VERSION_MINIMUM=3.5 lets us configure
        # without forking. -Wno-dev silences developer-mode warnings from minhook.
        run: cmake -G "Visual Studio 18 2026" -A x64 -B build -S . '-DCMAKE_POLICY_VERSION_MINIMUM=3.5' -DWKOPENVR_CAPTIONS_CUDA=OFF -DWKOPENVR_CAPTIONS_VULKAN=OFF -DWKOPENVR_RELEASE_BUILD=${{ matrix.channel == 'release' && 'ON' || 'OFF' }} -Wno-dev

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run test pipeline
        if: matrix.channel == 'dev'
        # test.ps1 runs every *_tests.exe gtest binary, the captions host and
        # phantom sidecar self-tests, and the WKOpenVR.exe --test-harness
        # in-process driver harness (no SteamVR needed). Downloads stay in the
        # scheduled nightly-tests.yml.
        shell: pwsh
        run: ./test.ps1 -SkipBuild -SkipDownload

      - name: Run tests
        if: matrix.channel == 'release'
        # Release gates the captions host and phantom sidecar off
        # (disabled-in-release.flag), and test.ps1 hard-fails when they are
        # missing, so the release leg runs the gtest binaries directly.
        shell: pwsh
        run: |
          $tests = Get-ChildItem build/artifacts/Release/*_tests.exe
          if ($tests.Count -eq 0) { throw "No test binaries found" }
          foreach ($t in $tests) {
            Write-Host "Running $($t.Name)..."
            & $t.FullName --gtest_brief=1
            if ($LASTEXITCODE -ne 0) { throw "$($t.Name) failed (exit $LASTEXITCODE)" }
          }

      - name: Stage artifacts
        if: matrix.channel == 'dev'
        shell: pwsh
        run: |
          $stage = "stage"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          $artifacts = @(
            @{ Name = "WKOpenVR.exe"; Source = "build/artifacts/Release/WKOpenVR.exe" },
            @{ Name = "driver_wkopenvr.dll"; Source = "build/driver_wkopenvr/bin/win64/driver_wkopenvr.dll" }
          )
          foreach ($artifact in $artifacts) {
              if (-not (Test-Path -LiteralPath $artifact.Source)) {
                  throw "$($artifact.Name) not found at $($artifact.Source)"
              }
              Copy-Item -LiteralPath $artifact.Source -Destination (Join-Path $stage $artifact.Name)
          }

      - name: Upload artifacts
        if: matrix.channel == 'dev'
        uses: actions/upload-artifact@v7
        with:
          name: pairdriver-${{ github.sha }}
          path: stage
          if-no-files-found: ignore
          retention-days: 14

      - name: Save build directory cache
        if: success() && steps.build-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v6
        with:
          path: build
          key: ${{ steps.build-cache.outputs.cache-primary-key }}
