name: Nightly Beta Releases

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-beta-release
  cancel-in-progress: false

jobs:
  tag:
    name: Create beta tag when modules changed
    runs-on: windows-2025-vs2026
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Validate planner
        shell: pwsh
        run: |
          ./.github/scripts/Test-WorkflowSyntax.ps1
          ./.github/scripts/Test-NightlyBetaPlan.ps1

      - name: Plan nightly beta
        id: plan
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.MODULE_RELEASE_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            throw "MODULE_RELEASE_TOKEN secret is required to read module releases and push nightly beta tags."
          }
          git fetch --tags --force
          ./.github/scripts/Get-NightlyBetaPlan.ps1

      - name: Report no changes
        if: ${{ steps.plan.outputs.has_changes != 'true' }}
        shell: pwsh
        run: Write-Host "No module release inputs changed since the latest module releases."

      - name: Push beta tag
        if: ${{ steps.plan.outputs.has_changes == 'true' }}
        shell: pwsh
        env:
          RELEASE_TOKEN: ${{ secrets.MODULE_RELEASE_TOKEN }}
          TAG_NAME: ${{ steps.plan.outputs.next_tag }}
          MODULES: ${{ steps.plan.outputs.features_csv }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_TOKEN)) {
            throw "MODULE_RELEASE_TOKEN secret is required to push beta tags."
          }
          if ([string]::IsNullOrWhiteSpace($env:TAG_NAME)) {
            throw "Planner did not return a beta tag."
          }
          if ([string]::IsNullOrWhiteSpace($env:MODULES)) {
            throw "Planner did not return any changed modules."
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a $env:TAG_NAME -m "WKOpenVR nightly beta $env:TAG_NAME"
          if ($LASTEXITCODE -ne 0) { throw "Could not create beta tag $env:TAG_NAME" }

          $remote = "https://x-access-token:$env:RELEASE_TOKEN@github.com/${{ github.repository }}.git"
          git push $remote "refs/tags/$env:TAG_NAME"
          if ($LASTEXITCODE -ne 0) { throw "Could not push beta tag $env:TAG_NAME" }

          Write-Host "Pushed $env:TAG_NAME for modules: $env:MODULES"
