name: Bug report
description: Something in WKOpenVR is not working as expected.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, check the README and wiki: https://github.com/RealWhyKnot/WKOpenVR/wiki
        If WKOpenVR can open, turn on **Enable debug logging**, reproduce the issue, then use **Report bug**. It prepares a sanitized report text file from recent logs and opens this form.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: |
        Steps to reproduce:
        1. ...
        2. ...
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: WKOpenVR version or commit
      placeholder: e.g. latest release tag, version.txt, or main @ <sha>
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, VRChat/SteamVR/Unity/.NET/Python versions, hardware, or other context relevant to this repo.
      placeholder: |
        OS:
        App/runtime version:
        Hardware/context:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Diagnostic report, logs, or console output
      description: Attach the sanitized WKOpenVR bug report .txt file if you used Report bug after reproducing with debug logging enabled. Otherwise paste relevant logs, build errors, stack traces, or screenshots. Redact tokens and private URLs.
      render: text
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Links, screenshots, suspected cause, or workarounds tried.
